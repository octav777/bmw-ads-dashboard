<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADS CONTROL CENTER</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#030305;--s1:#0a0a12;--s2:#0f0f1a;--s3:#141420;
  --b:#1a1a28;--b2:#22223a;
  --cyan:#00e5ff;--cyan2:#4fc3f7;--cyan3:#80deea;
  --green:#00e676;--green2:#69f0ae;
  --yellow:#ffea00;--yellow2:#fff176;
  --purple:#ce93d8;--purple2:#e040fb;
  --orange:#ff9800;--red:#ff5252;--pink:#f48fb1;
  --text:#e8e8f0;--muted:#44445a;--muted2:#666688;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,229,255,0.025) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,229,255,0.025) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
  pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:24px 16px;}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;padding-bottom:16px;border-bottom:1px solid var(--b);}
.logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(14px,2.5vw,22px);color:var(--cyan);letter-spacing:0.12em;text-shadow:0 0 24px rgba(0,229,255,0.5);}
.logo span{display:block;font-size:0.45em;color:var(--muted2);letter-spacing:0.35em;margin-top:2px;}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(0,230,118,0.07);border:1px solid rgba(0,230,118,0.25);border-radius:20px;padding:5px 14px;font-size:10px;color:var(--green);letter-spacing:0.2em;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.4s ease-in-out infinite;box-shadow:0 0 7px var(--green);}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.75)}}
.tabs-bar{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
.tab{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:0.12em;padding:7px 14px;border-radius:6px;border:1px solid var(--b);background:var(--s1);color:var(--muted2);cursor:pointer;transition:all .2s;white-space:nowrap;}
.tab:hover{border-color:var(--b2);color:var(--text);}
.tab.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,0.05);box-shadow:0 0 10px rgba(0,229,255,0.08);}
.tab.global.active{border-color:var(--yellow);color:var(--yellow);background:rgba(255,234,0,0.05);box-shadow:0 0 10px rgba(255,234,0,0.08);}
.sec{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:0.3em;color:var(--muted2);margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:8px;}
.kpi-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:16px;}
.kpi{background:var(--s1);border:1px solid var(--b);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;transition:border-color .25s;}
.kpi:hover{border-color:var(--b2);}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;}
.kpi.c-cyan::before{background:linear-gradient(90deg,var(--cyan),transparent);}
.kpi.c-green::before{background:linear-gradient(90deg,var(--green),transparent);}
.kpi.c-yellow::before{background:linear-gradient(90deg,var(--yellow),transparent);}
.kpi.c-purple::before{background:linear-gradient(90deg,var(--purple),transparent);}
.kpi.c-orange::before{background:linear-gradient(90deg,var(--orange),transparent);}
.kpi.c-pink::before{background:linear-gradient(90deg,var(--pink),transparent);}
.kpi.c-red::before{background:linear-gradient(90deg,var(--red),transparent);}
.kpi-lbl{font-size:8px;color:var(--muted2);letter-spacing:0.2em;margin-bottom:5px;}
.kpi-val{font-family:'Orbitron',sans-serif;font-size:clamp(16px,2.5vw,22px);font-weight:900;line-height:1;}
.kpi.c-cyan .kpi-val{color:var(--cyan);}
.kpi.c-green .kpi-val{color:var(--green);}
.kpi.c-yellow .kpi-val{color:var(--yellow);}
.kpi.c-purple .kpi-val{color:var(--purple);}
.kpi.c-orange .kpi-val{color:var(--orange);}
.kpi.c-pink .kpi-val{color:var(--pink);}
.kpi.c-red .kpi-val{color:var(--red);}
.kpi-sub{font-size:9px;color:var(--muted2);margin-top:4px;}
.live-count{display:flex;align-items:center;gap:6px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse .8s ease-in-out infinite;}
.hero{background:linear-gradient(135deg,#080d18,#080a14);border:1px solid rgba(0,229,255,0.15);border-radius:14px;padding:24px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;top:-50%;right:-5%;width:280px;height:280px;background:radial-gradient(circle,rgba(0,229,255,0.04),transparent 70%);pointer-events:none;}
.hero-lbl{font-size:9px;letter-spacing:0.3em;color:var(--muted2);margin-bottom:4px;}
.hero-val{font-family:'Orbitron',sans-serif;font-size:clamp(30px,5vw,52px);font-weight:900;color:var(--cyan);text-shadow:0 0 40px rgba(0,229,255,0.35);line-height:1;}
.hero-today{font-size:11px;color:var(--green);margin-top:5px;}
.hero-month{font-size:10px;color:var(--muted2);margin-top:2px;}
.hero-stats{display:flex;gap:20px;flex-wrap:wrap;}
.hst{text-align:center;}
.hst-v{font-family:'Orbitron',sans-serif;font-size:17px;font-weight:700;}
.hst-l{font-size:8px;color:var(--muted2);letter-spacing:0.18em;margin-top:2px;}
.target-row{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;background:var(--s1);border:1px solid var(--b);border-radius:10px;padding:16px;margin-bottom:16px;}
.target-lbl{font-family:'Orbitron',sans-serif;font-size:9px;color:var(--cyan);letter-spacing:0.2em;margin-bottom:8px;}
.prog-wrap{background:rgba(255,255,255,0.04);border-radius:6px;height:8px;overflow:hidden;margin-bottom:6px;}
.prog-bar{height:100%;border-radius:6px;transition:width 1.2s cubic-bezier(.4,0,.2,1);background:linear-gradient(90deg,var(--cyan),var(--cyan2));box-shadow:0 0 8px rgba(0,229,255,0.25);}
.prog-bar.warn{background:linear-gradient(90deg,var(--orange),var(--yellow));}
.prog-bar.done{background:linear-gradient(90deg,var(--green),var(--green2));}
.prog-info{display:flex;justify-content:space-between;font-size:10px;color:var(--muted2);}
.prog-pct{color:var(--cyan);font-family:'Orbitron',sans-serif;font-size:11px;}
.target-right{text-align:center;}
.btn-sm{background:none;border:1px solid var(--b);color:var(--muted2);font-family:'Share Tech Mono',monospace;font-size:10px;padding:6px 12px;border-radius:6px;cursor:pointer;transition:all .2s;display:block;margin-bottom:6px;width:100%;}
.btn-sm:hover{border-color:var(--cyan);color:var(--cyan);}
.record{font-size:9px;color:var(--muted2);text-align:center;}
.record-val{color:var(--yellow);font-family:'Orbitron',sans-serif;}
.ad-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;margin-bottom:16px;}
.acard{background:var(--s1);border:1px solid var(--b);border-radius:10px;padding:18px;position:relative;overflow:hidden;}
.acard::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.acard.int::after{background:linear-gradient(90deg,var(--cyan2),transparent);}
.acard.ban::after{background:linear-gradient(90deg,var(--green),transparent);}
.acard.rew::after{background:linear-gradient(90deg,var(--purple),transparent);}
.acard-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.acard-title{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.15em;}
.acard.int .acard-title{color:var(--cyan2);}
.acard.ban .acard-title{color:var(--green);}
.acard.rew .acard-title{color:var(--purple);}
.acard-icon{font-size:16px;opacity:.5;}
.arow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
.arow:last-child{border-bottom:none;}
.albl{font-size:9px;color:var(--muted2);letter-spacing:0.1em;}
.aval{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;}
.aval.rev{color:var(--yellow);}
.aval.ecpm{color:var(--cyan);}
.aval.ctr{color:var(--orange);}
.aval.fill{color:var(--green);}
.fill-wrap{display:flex;align-items:center;gap:6px;}
.fill-bar-bg{flex:1;height:3px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
.fill-bar-fg{height:100%;border-radius:3px;background:var(--green);}
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:10px;margin-bottom:16px;}
.ccrd{background:var(--s1);border:1px solid var(--b);border-radius:10px;padding:18px;}
.ccrd-title{font-family:'Orbitron',sans-serif;font-size:9px;color:var(--muted2);letter-spacing:0.2em;margin-bottom:12px;}
.ccrd-wrap{position:relative;height:160px;}
.breakdown-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-bottom:16px;}
.bcard{background:var(--s1);border:1px solid var(--b);border-radius:10px;padding:18px;}
.bcard-title{font-family:'Orbitron',sans-serif;font-size:9px;color:var(--muted2);letter-spacing:0.2em;margin-bottom:12px;}
.bitem{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
.bitem:last-child{border-bottom:none;}
.brank{font-family:'Orbitron',sans-serif;font-size:9px;color:var(--muted);width:18px;}
.bname{flex:1;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bbar-bg{width:60px;height:3px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;}
.bbar-fg{height:100%;border-radius:3px;background:var(--cyan2);}
.bval{font-family:'Orbitron',sans-serif;font-size:10px;min-width:28px;text-align:right;}
.retention-card{background:var(--s1);border:1px solid var(--b);border-radius:10px;padding:18px;margin-bottom:16px;}
.ret-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px;}
.ret-cell{text-align:center;background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:12px 6px;}
.ret-day{font-size:8px;color:var(--muted2);letter-spacing:0.2em;margin-bottom:4px;}
.ret-val{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;color:var(--cyan);}
.ret-sub{font-size:8px;color:var(--muted2);margin-top:2px;}
.app-table-wrap{background:var(--s1);border:1px solid var(--b);border-radius:10px;padding:18px;margin-bottom:16px;overflow-x:auto;}
.app-table{width:100%;border-collapse:collapse;font-size:10px;}
.app-table th{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:0.18em;color:var(--muted2);padding:8px 10px;text-align:left;border-bottom:1px solid var(--b);}
.app-table td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,0.03);}
.app-table tr:last-child td{border-bottom:none;}
.app-table tr:hover td{background:rgba(0,229,255,0.02);}
.app-link{font-family:'Orbitron',sans-serif;font-size:9px;color:var(--cyan);cursor:pointer;}
.app-link:hover{text-decoration:underline;}
td.td-rev{color:var(--yellow);font-family:'Orbitron',sans-serif;}
td.td-imp{color:var(--cyan2);}
td.td-ses{color:var(--green);}
td.td-pct{color:var(--muted2);}

/* ══ TIMELINE ════════════════════════════════════════════════════ */
.tl-card{background:var(--s1);border:1px solid var(--b);border-radius:10px;padding:18px;margin-bottom:16px;}
.tl-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.tl-title{font-family:'Orbitron',sans-serif;font-size:9px;color:var(--muted2);letter-spacing:0.2em;display:flex;align-items:center;gap:8px;}
/* indicator live nou eveniment */
.tl-live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse .8s ease-in-out infinite;display:none;}
.tl-live-dot.on{display:inline-block;}
.tl-filter{display:flex;gap:4px;flex-wrap:wrap;}
.tl-fbtn{background:none;border:1px solid var(--b);color:var(--muted2);font-family:'Share Tech Mono',monospace;font-size:8px;padding:3px 8px;border-radius:4px;cursor:pointer;transition:all .15s;}
.tl-fbtn:hover{border-color:var(--b2);color:var(--text);}
.tl-fbtn.on{border-color:var(--cyan);color:var(--cyan);}
.tl-list{max-height:320px;overflow-y:auto;}
.tl-list::-webkit-scrollbar{width:3px;}
.tl-list::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px;}
.tl-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
.tl-item:last-child{border-bottom:none;}
/* animatie pentru eveniment NOU */
.tl-item.new{animation:tlNew .6s ease;}
@keyframes tlNew{
  0%{opacity:0;transform:translateX(-10px);background:rgba(0,229,255,0.06);}
  40%{background:rgba(0,229,255,0.06);}
  100%{opacity:1;transform:none;background:transparent;}
}
@keyframes fadeIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
.tl-time{font-size:9px;color:var(--muted2);min-width:60px;font-family:'Share Tech Mono',monospace;}
.tl-text{flex:1;font-size:10px;}
.tl-badge{font-size:8px;padding:2px 6px;border-radius:3px;white-space:nowrap;}
.tl-badge.session{background:rgba(0,230,118,0.1);color:var(--green);border:1px solid rgba(0,230,118,0.2);}
.tl-badge.interstitial_imp,.tl-badge.interstitial_click{background:rgba(79,195,247,0.1);color:var(--cyan2);border:1px solid rgba(79,195,247,0.2);}
.tl-badge.rewarded_imp,.tl-badge.rewarded_click,.tl-badge.reward_earned{background:rgba(206,147,216,0.1);color:var(--purple);border:1px solid rgba(206,147,216,0.2);}
.tl-badge.banner_click{background:rgba(0,230,118,0.1);color:var(--green2);border:1px solid rgba(0,230,118,0.2);}
.tl-badge.iap{background:rgba(255,234,0,0.1);color:var(--yellow);border:1px solid rgba(255,234,0,0.2);}
.tl-badge.error{background:rgba(255,82,82,0.1);color:var(--red);border:1px solid rgba(255,82,82,0.2);}
.tl-badge.custom{background:rgba(255,152,0,0.1);color:var(--orange);border:1px solid rgba(255,152,0,0.2);}
.tl-meta{font-size:9px;color:var(--muted2);text-align:right;min-width:30px;}
.tl-app-badge{font-size:8px;color:var(--cyan);background:rgba(0,229,255,0.06);border:1px solid rgba(0,229,255,0.15);border-radius:3px;padding:1px 5px;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--s2);border:1px solid var(--b2);border-radius:12px;padding:24px;width:300px;}
.modal h3{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--cyan);margin-bottom:14px;letter-spacing:0.15em;}
.modal input{width:100%;background:var(--bg);border:1px solid var(--b);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:14px;padding:10px;border-radius:8px;margin-bottom:14px;}
.modal input:focus{outline:none;border-color:var(--cyan);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.btn{background:none;border:1px solid var(--b);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:10px;padding:7px 14px;border-radius:6px;cursor:pointer;}
.btn.primary{background:var(--cyan);border-color:var(--cyan);color:#000;font-weight:700;}
.btn:hover{opacity:.8;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:70vh;gap:14px;}
.spinner{width:34px;height:34px;border:2px solid var(--b);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:10px;color:var(--muted2);letter-spacing:0.3em;}
.empty{text-align:center;padding:24px;color:var(--muted2);font-size:10px;letter-spacing:0.18em;}
footer{text-align:center;font-size:9px;color:var(--muted2);letter-spacing:0.18em;padding:16px 0;}
</style>
</head>
<body>

<div id="app"><div class="loading"><div class="spinner"></div><div class="loading-txt">CONNECTING TO FIREBASE...</div></div></div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>🎯 SET DAILY TARGET</h3>
    <input type="number" id="target-input" placeholder="Ex: 10.00" step="0.01" min="0">
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">CANCEL</button>
      <button class="btn primary" onclick="saveTarget()">SAVE</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, query, limitToLast, orderByKey }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({ databaseURL: "https://bmwadsstats-default-rtdb.firebaseio.com/" });
const db  = getDatabase(app);

// ── State ─────────────────────────────────────────────────────────
let state       = {};
let activeTab   = 'global';
let charts      = {};
let tlFilter    = 'all';
let dailyTarget = parseFloat(localStorage.getItem('dailyTarget') || '10');

// ── Timeline state separat — actualizat INDEPENDENT de state principal ──
// { appId: [ {time, text, type, country, _key, _appId} ] }
let tlByApp = {};
// Ultimele 40 de evenimente combinate (global)
let tlGlobal = [];
// Map listeners activi { appId: unsubscribeFn }
let tlListeners = {};

// ── Exposed globals ───────────────────────────────────────────────
window.openModal  = () => { document.getElementById('target-input').value = dailyTarget; document.getElementById('modal').classList.add('open'); };
window.closeModal = () => document.getElementById('modal').classList.remove('open');
window.saveTarget = () => {
  const v = parseFloat(document.getElementById('target-input').value);
  if (!isNaN(v) && v > 0) { dailyTarget = v; localStorage.setItem('dailyTarget', v); }
  closeModal(); renderAll();
};
window.switchTab    = t => { activeTab = t; renderAll(); };
window.setTlFilter  = f => { tlFilter = f; renderTlOnly(); };

// ── Format helpers ────────────────────────────────────────────────
const FMT  = n => { n=parseFloat(n)||0; if(n>=1e6)return(n/1e6).toFixed(1)+'M'; if(n>=1e3)return(n/1e3).toFixed(1)+'K'; return Math.round(n).toString(); };
const REV  = n => '$'+(parseFloat(n)||0).toFixed(4);
const REVS = n => '$'+(parseFloat(n)||0).toFixed(2);
const ECPM = n => '$'+(parseFloat(n)||0).toFixed(2);
const PCT  = n => (parseFloat(n)||0).toFixed(2)+'%';
const TODAY = () => new Date().toISOString().split('T')[0];
const MONTH = () => new Date().toISOString().substring(0,7);

// ── App helpers ───────────────────────────────────────────────────
const appIds    = () => Object.keys(state.app_registry||{}).sort();
const appData   = id => (state.apps&&state.apps[id])||{};
const appTotal  = id => appData(id).total||{};
const appToday  = id => { const d=appData(id).daily; return (d&&d[TODAY()])||{}; };
const appMonth  = id => { const d=appData(id).monthly; return (d&&d[MONTH()])||{}; };
const appReg    = id => (state.app_registry&&state.app_registry[id])||{};
const appName   = id => appReg(id).name || id.replace(/_/g,' ');

const appTotalRev  = id => parseFloat(appTotal(id).revenue)||0;
const appTodayRev  = id => parseFloat(appToday(id).revenue)||0;
const appMonthRev  = id => parseFloat(appMonth(id).revenue)||0;
const appTotalSes  = id => parseInt(appTotal(id).sessions)||0;
const appDAU       = id => parseInt(appToday(id).dau_count)||0;
const appMAU       = id => parseInt(appMonth(id).mau_count)||0;
const appARPDAU    = id => parseFloat(appToday(id).arpdau)||0;
const appRevPerSes = id => parseFloat(appTotal(id).revenue_per_session)||0;

const appImpTotal = (id,t) => parseInt((appTotal(id)[t]||{}).impressions)||0;
const appImpToday = (id,t) => parseInt((appToday(id)[t]||{}).impressions)||0;
const appClkTotal = (id,t) => parseInt((appTotal(id)[t]||{}).clicks)||0;
const appRevTotal = (id,t) => parseFloat((appTotal(id)[t]||{}).revenue)||0;
const appRevToday = (id,t) => parseFloat((appToday(id)[t]||{}).revenue)||0;
const appECPM     = (id,t) => parseFloat((appTotal(id)[t]||{}).ecpm)||0;
const appCTR      = (id,t) => parseFloat((appTotal(id)[t]||{}).ctr)||0;
const appFill     = (id,t) => parseFloat((appTotal(id)[t]||{}).fill_rate)||0;
const appReq      = (id,t) => parseInt((appTotal(id)[t]||{}).requests)||0;
const appFailed   = (id,t) => parseInt((appTotal(id)[t]||{}).failed)||0;
const appCompl    = id => parseInt((appTotal(id).rewarded||{}).completions)||0;
const appTotalImpressions = id => ['interstitial','banner','rewarded'].reduce((s,t)=>s+appImpTotal(id,t),0);
const appTotalIAPRev   = id => parseFloat((appTotal(id).iap||{}).revenue)||0;
const appTotalIAPPurch = id => parseInt((appTotal(id).iap||{}).purchases)||0;

const appLiveCount = id => {
  const live = appData(id).live||{};
  const now  = Math.floor(Date.now()/1000);
  return Object.values(live).filter(ts => (now - parseInt(ts)) < 120).length;
};
const appBestDay = id => {
  const daily = appData(id).daily||{};
  return Math.max(0,...Object.values(daily).map(d=>parseFloat((d||{}).revenue)||0));
};
const appDailyChart = id => {
  const daily = appData(id).daily||{};
  const days  = Object.keys(daily).sort().slice(-14);
  return {
    labels:      days.map(d=>d.slice(5)),
    revenue:     days.map(d=>parseFloat((daily[d]||{}).revenue)||0),
    dau:         days.map(d=>parseInt((daily[d]||{}).dau_count)||0),
    impressions: days.map(d=>['interstitial','banner','rewarded'].reduce((s,t)=>s+(parseInt(((daily[d]||{})[t]||{}).impressions)||0),0))
  };
};
const appTopList = (id,node,max=8) => {
  const data = appData(id)[node]||{};
  return Object.entries(data).map(([k,v])=>({name:k.replace(/_/g,' '),val:parseInt(v)||0}))
    .sort((a,b)=>b.val-a.val).slice(0,max);
};

// ── Global aggregates ─────────────────────────────────────────────
const gRev      = ()=>appIds().reduce((s,id)=>s+appTotalRev(id),0);
const gTodayRev = ()=>appIds().reduce((s,id)=>s+appTodayRev(id),0);
const gMonthRev = ()=>appIds().reduce((s,id)=>s+appMonthRev(id),0);
const gDAU      = ()=>appIds().reduce((s,id)=>s+appDAU(id),0);
const gMAU      = ()=>appIds().reduce((s,id)=>s+appMAU(id),0);
const gImp      = ()=>appIds().reduce((s,id)=>s+appTotalImpressions(id),0);
const gLive     = ()=>appIds().reduce((s,id)=>s+appLiveCount(id),0);

// ════════════════════════════════════════════════════════════════
// TIMELINE LIVE — LISTENER DEDICAT PER APP
// Firebase POST generează key unic → onValue pe root NU prinde
// evenimentele noi dacă Firebase nu re-trimite tot sub-tree-ul.
// Fix: listener separat pe /apps/{id}/timeline cu limitToLast(25).
// ════════════════════════════════════════════════════════════════

function setupTimelineListeners(ids) {
  // Adaugă listeneri pentru app-uri noi
  ids.forEach(id => {
    if (tlListeners[id]) return; // deja activ

    const tlRef = query(
      ref(db, `apps/${id}/timeline`),
      orderByKey(),
      limitToLast(25)
    );

    const unsub = onValue(tlRef, snap => {
      const raw = snap.val() || {};
      // Transformă obiectul în array, adaugă _key și _appId
      const items = Object.entries(raw).map(([k, v]) => ({
        ...v,
        _key:   k,
        _appId: id
      }));
      // Sortează după time string DESC (HH:mm:ss — funcționează corect în aceeași zi)
      items.sort((a, b) => (b.time || '').localeCompare(a.time || ''));
      tlByApp[id] = items;

      // Rebuild global timeline
      rebuildGlobalTimeline();

      // Dacă tab-ul activ e acest app sau global → re-render doar timeline
      renderTlOnly();
    });

    tlListeners[id] = unsub;
  });

  // Oprește listeneri pentru app-uri care nu mai există
  Object.keys(tlListeners).forEach(id => {
    if (!ids.includes(id)) {
      tlListeners[id](); // unsubscribe
      delete tlListeners[id];
      delete tlByApp[id];
    }
  });
}

function rebuildGlobalTimeline() {
  let all = [];
  Object.entries(tlByApp).forEach(([id, items]) => {
    items.forEach(e => all.push(e));
  });
  all.sort((a, b) => (b.time || '').localeCompare(a.time || ''));
  tlGlobal = all.slice(0, 40);
}

// Returnează timeline-ul filtrat pentru tab-ul activ
function getCurrentTimeline() {
  const items = activeTab === 'global'
    ? tlGlobal
    : (tlByApp[activeTab] || []);

  if (tlFilter === 'all') return items;
  return items.filter(e => (e.type || '').includes(tlFilter));
}

// Re-render DOAR secțiunea timeline fără să rebuild tot DOM-ul
// Evită flickering și pierderea scroll position pe restul paginii
function renderTlOnly() {
  const container = document.getElementById('tl-container');
  if (!container) return; // pagina nu e încă renderată
  container.innerHTML = renderTimelineInner(getCurrentTimeline(), activeTab === 'global');

  // Flash pe dot-ul live ca să indice update
  const dot = document.getElementById('tl-live-dot');
  if (dot) {
    dot.classList.add('on');
    clearTimeout(window._tlDotTimer);
    window._tlDotTimer = setTimeout(() => dot.classList.remove('on'), 2000);
  }
}

// ── Render principal ──────────────────────────────────────────────
function renderAll() {
  const ids = appIds();
  if (activeTab !== 'global' && !ids.includes(activeTab)) activeTab = 'global';

  // Setup timeline listeners pentru toate app-urile cunoscute
  setupTimelineListeners(ids);

  const tabsHtml = `<div class="tabs-bar">
    <div class="tab global ${activeTab==='global'?'active':''}" onclick="switchTab('global')">🌐 GLOBAL</div>
    ${ids.map(id=>`<div class="tab ${activeTab===id?'active':''}" onclick="switchTab('${id}')">${appName(id)}</div>`).join('')}
  </div>`;

  document.getElementById('app').innerHTML =
    tabsHtml + (activeTab === 'global' ? renderGlobal(ids) : renderApp(activeTab));

}

}

  return items.map((e, idx) => `
    <div class="tl-item${idx === 0 ? ' new' : ''}">
      <div class="tl-time">${e.time || ''}</div>
      <div class="tl-text">${e.text || ''}</div>
      ${showAppBadge && e._appId ? `<div class="tl-app-badge">${appName(e._appId)}</div>` : ''}
      <div class="tl-badge ${e.type || ''}">${(e.type || 'event').replace(/_/g,' ')}</div>
      <div class="tl-meta">${e.country || ''}</div>
    </div>`).join('');
}

// ── Charts ────────────────────────────────────────────────────────
function buildCharts(id) {
  if (!id) return;
  const data = appDailyChart(id);
  ['cRev','cDAU','cImp','cPie'].forEach(cid => {
    if (charts[cid]) { charts[cid].destroy(); delete charts[cid]; }
  });

  const def = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { grid:{color:'rgba(255,255,255,0.03)'}, ticks:{color:'#44445a',font:{family:'Share Tech Mono',size:9}} },
      y: { grid:{color:'rgba(255,255,255,0.03)'}, ticks:{color:'#44445a',font:{family:'Share Tech Mono',size:9}} }
    }
  };

  const mk = (cid, type, dataset, opts={}) => {
    const c = document.getElementById(cid);
    if (c) charts[cid] = new Chart(c, {type, data:{labels:data.labels,datasets:[dataset]}, options:{...def,...opts}});
  };

  mk('cRev','bar', {data:data.revenue,    backgroundColor:'rgba(255,234,0,0.4)',  borderColor:'#ffea00',borderWidth:1,borderRadius:3});
  mk('cDAU','line',{data:data.dau,        borderColor:'#00e5ff',backgroundColor:'rgba(0,229,255,0.07)',borderWidth:2,fill:true,tension:0.4,pointBackgroundColor:'#00e5ff',pointRadius:3});
  mk('cImp','line',{data:data.impressions,borderColor:'#4fc3f7',backgroundColor:'rgba(79,195,247,0.07)',borderWidth:2,fill:true,tension:0.4,pointBackgroundColor:'#4fc3f7',pointRadius:3});

  const revI=appRevTotal(activeTab,'interstitial'), revB=appRevTotal(activeTab,'banner'), revR=appRevTotal(activeTab,'rewarded');
  const pc = document.getElementById('cPie');
  if (pc) charts.cPie = new Chart(pc, {
    type:'doughnut',
    data:{labels:['Interstitial','Banner','Rewarded'],datasets:[{data:[revI,revB,revR],
      backgroundColor:['rgba(79,195,247,0.7)','rgba(0,230,118,0.7)','rgba(206,147,216,0.7)'],
      borderColor:['#4fc3f7','#00e676','#ce93d8'],borderWidth:1}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{color:'#44445a',font:{family:'Share Tech Mono',size:9},padding:8}}}}
  });
}

// ── Firebase listener PRINCIPAL (stats, nu timeline) ──────────────
// Exclude /apps/*/timeline din listener principal ca să nu descărcăm
// tot tree-ul de timeline la fiecare update de stats.
// Ascultăm /apps/{id}/total, /apps/{id}/daily, /apps/{id}/monthly separat
// sau mai simplu — ascultăm root dar ignorăm timeline în render
// (timeline vine din listenerii dedicați de mai sus).
onValue(ref(db, '/'), snap => {
  const raw = snap.val() || {};
  // Păstrăm state-ul complet dar timeline-ul NU e folosit din state —
  // e gestionat de tlByApp prin listenerii dedicați.
  state = raw;

  // La primul update, setup timeline listeners
  const ids = Object.keys(raw.app_registry || {}).sort();
  setupTimelineListeners(ids);

  renderAll();
});
</script>
