<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMW Ads Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  /* DARK THEME (default) */
  --bg: #0a0e27;
  --surface: #111829;
  --surface2: #16213a;
  --border: #1f2d47;
  --accent: #00d9ff;
  --accent2: #0099ff;
  --green: #10b981;
  --yellow: #fbbf24;
  --purple: #d084d0;
  --red: #ef4444;
  --orange: #f97316;
  --text: #f1f5f9;
  --muted: #64748b;
  --hover-bg: rgba(0, 217, 255, 0.08);
}

html[data-theme="light"] {
  --bg: #f8fafc;
  --surface: #ffffff;
  --surface2: #f1f5f9;
  --border: #e2e8f0;
  --accent: #0099ff;
  --accent2: #0066cc;
  --green: #059669;
  --yellow: #d97706;
  --purple: #9333ea;
  --red: #dc2626;
  --orange: #ea580c;
  --text: #0f172a;
  --muted: #64748b;
  --hover-bg: rgba(0, 153, 255, 0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  transition: background 0.3s ease, color 0.3s ease;
}

body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(0, 217, 255, 0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 217, 255, 0.02) 1px, transparent 1px);
  background-size:50px 50px;
  pointer-events:none;
  z-index:0;
}

.wrap { position:relative; z-index:1; max-width:1300px; margin:0 auto; padding:32px 20px; }

/* HEADER */
header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:40px;
  flex-wrap:wrap;
  gap:20px;
  padding-bottom:20px;
  border-bottom: 1px solid var(--border);
}

.logo {
  font-family:'Syne', sans-serif;
  font-weight:800;
  font-size:clamp(20px, 4vw, 32px);
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing:-0.02em;
  transition: all 0.3s ease;
}

.logo span {
  display:block;
  font-size:0.45em;
  font-weight:500;
  color:var(--muted);
  letter-spacing:0.08em;
  margin-top:4px;
  text-transform:uppercase;
}

.header-controls {
  display:flex;
  align-items:center;
  gap:16px;
}

.live-badge {
  display:flex;
  align-items:center;
  gap:8px;
  background: rgba(16, 185, 129, 0.1);
  border: 1px solid rgba(16, 185, 129, 0.3);
  border-radius:24px;
  padding:8px 16px;
  font-size:11px;
  color: var(--green);
  letter-spacing:0.05em;
  font-weight:600;
  transition: all 0.3s ease;
}

.live-badge:hover {
  background: rgba(16, 185, 129, 0.2);
  border-color: var(--green);
}

.dot {
  width:8px;
  height:8px;
  border-radius:50%;
  background: var(--green);
  animation: pulse 1.5s ease-in-out infinite;
  box-shadow: 0 0 12px var(--green);
}

@keyframes pulse {
  0%, 100% { opacity:1; transform:scale(1) }
  50% { opacity:0.4; transform:scale(0.8) }
}

.theme-toggle {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 6px;
  display: flex;
  gap: 4px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.theme-toggle:hover {
  border-color: var(--accent);
}

.theme-btn {
  width: 32px;
  height: 32px;
  border: none;
  background: transparent;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.theme-btn.active {
  background: var(--hover-bg);
  border: 1px solid var(--accent);
}

/* HERO */
.hero {
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px;
  margin-bottom: 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 32px;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(10px);
}

.hero::before {
  content:'';
  position: absolute;
  top: -50%;
  right: -10%;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(0, 217, 255, 0.08), transparent 70%);
  pointer-events: none;
}

.hero-section {
  position: relative;
  z-index: 2;
}

.hero-lbl {
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 12px;
  font-weight: 600;
  text-transform: uppercase;
}

.hero-val {
  font-family:'Syne', sans-serif;
  font-size: clamp(32px, 6vw, 56px);
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.02em;
}

.hero-today {
  font-size: 13px;
  color: var(--green);
  margin-top: 8px;
  font-weight: 600;
}

.hero-stats {
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
  position: relative;
  z-index: 2;
}

.hstat {
  text-align: center;
  padding: 20px;
  background: rgba(0, 217, 255, 0.05);
  border: 1px solid rgba(0, 217, 255, 0.1);
  border-radius: 16px;
  transition: all 0.3s ease;
}

.hstat:hover {
  background: var(--hover-bg);
  border-color: var(--accent);
  transform: translateY(-4px);
}

.hstat-v {
  font-family:'Syne', sans-serif;
  font-size: 24px;
  font-weight: 800;
  color: var(--accent);
}

.hstat-l {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.08em;
  margin-top: 6px;
  font-weight: 600;
  text-transform: uppercase;
}

/* SECTION TITLE */
.section-title {
  font-family:'Syne', sans-serif;
  font-size: 13px;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin: 40px 0 20px;
  border-bottom: 2px solid var(--border);
  padding-bottom: 12px;
  font-weight: 700;
  text-transform: uppercase;
}

/* AD CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
  margin-bottom: 32px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
}

.card:hover {
  border-color: var(--accent);
  transform: translateY(-6px);
  box-shadow: 0 20px 40px rgba(0, 217, 255, 0.1);
}

.card::before {
  content:'';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  border-radius: 16px 16px 0 0;
}

.card.interstitial::before { background: linear-gradient(90deg, var(--accent), transparent); }
.card.banner::before { background: linear-gradient(90deg, var(--green), transparent); }
.card.rewarded::before { background: linear-gradient(90deg, var(--purple), transparent); }

.card-hd {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}

.card-title {
  font-family:'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.card.interstitial .card-title { color: var(--accent); }
.card.banner .card-title { color: var(--green); }
.card.rewarded .card-title { color: var(--purple); }

.card-icon {
  font-size: 20px;
  opacity: 0.7;
}

.srow {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.srow:last-child { border-bottom: none; }

.slbl {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.05em;
  font-weight: 600;
  text-transform: uppercase;
}

.sval {
  font-family:'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  transition: color 0.3s;
}

.sval.rev { color: var(--yellow); }
.sval.ecpm { color: var(--accent); }
.sval.ctr { color: var(--orange); }

/* TARGET PROGRESS */
.target-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  margin-bottom: 32px;
  transition: all 0.3s ease;
}

.target-card:hover {
  border-color: var(--accent);
  box-shadow: 0 10px 30px rgba(0, 217, 255, 0.08);
}

.target-hd {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}

.target-title {
  font-family:'Syne', sans-serif;
  font-size: 14px;
  color: var(--accent);
  letter-spacing: 0.05em;
  font-weight: 700;
}

.target-edit {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family:'Inter', sans-serif;
  font-size: 12px;
  padding: 8px 16px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.3s ease;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.target-edit:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--hover-bg);
}

.progress-wrap {
  background: var(--surface2);
  border-radius: 12px;
  height: 14px;
  overflow: hidden;
  margin-bottom: 12px;
  border: 1px solid var(--border);
}

.progress-bar {
  height: 100%;
  border-radius: 12px;
  transition: width 1s ease;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  box-shadow: 0 0 15px rgba(0, 217, 255, 0.4);
}

.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 12px;
}

.progress-pct {
  color: var(--accent);
  font-family:'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
}

.record-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
  font-size: 12px;
  color: var(--muted);
  font-weight: 600;
}

.record-val {
  color: var(--yellow);
  font-family:'Syne', sans-serif;
  font-weight: 700;
  font-size: 14px;
}

/* CHARTS GRID */
.charts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 20px;
  margin-bottom: 32px;
}

.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  transition: all 0.3s ease;
}

.chart-card:hover {
  border-color: var(--accent);
  box-shadow: 0 10px 30px rgba(0, 217, 255, 0.08);
}

.chart-title {
  font-family:'Syne', sans-serif;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.08em;
  margin-bottom: 20px;
  font-weight: 700;
  text-transform: uppercase;
}

.chart-wrap {
  position: relative;
  height: 220px;
}

/* TOP LISTS */
.lists-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
  margin-bottom: 32px;
}

.list-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  transition: all 0.3s ease;
}

.list-card:hover {
  border-color: var(--accent);
  box-shadow: 0 10px 30px rgba(0, 217, 255, 0.08);
}

.list-title {
  font-family:'Syne', sans-serif;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.08em;
  margin-bottom: 16px;
  font-weight: 700;
  text-transform: uppercase;
}

.list-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.list-item:last-child { border-bottom: none; }

.list-rank {
  font-family:'Syne', sans-serif;
  font-size: 12px;
  color: var(--accent);
  width: 24px;
  font-weight: 700;
}

.list-name {
  flex: 1;
  font-size: 13px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 500;
}

.list-bar-wrap {
  width: 80px;
  height: 5px;
  background: var(--border);
  border-radius: 6px;
  overflow: hidden;
}

.list-bar {
  height: 100%;
  border-radius: 6px;
  background: var(--accent);
  transition: width 0.5s ease;
}

.list-val {
  font-family:'Syne', sans-serif;
  font-size: 13px;
  color: var(--text);
  min-width: 40px;
  text-align: right;
  font-weight: 700;
}

/* TIMELINE */
.timeline-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  margin-bottom: 32px;
  transition: all 0.3s ease;
}

.timeline-card:hover {
  border-color: var(--accent);
  box-shadow: 0 10px 30px rgba(0, 217, 255, 0.08);
}

.timeline-title {
  font-family:'Syne', sans-serif;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.08em;
  margin-bottom: 16px;
  font-weight: 700;
  text-transform: uppercase;
}

.timeline-list {
  max-height: 300px;
  overflow-y: auto;
}

.timeline-list::-webkit-scrollbar { width: 6px; }
.timeline-list::-webkit-scrollbar-track { background: transparent; }
.timeline-list::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 6px;
  transition: all 0.3s ease;
}
.timeline-list::-webkit-scrollbar-thumb:hover { background: var(--accent); }

.tl-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  animation: fadeIn 0.4s ease;
}

.tl-item:last-child { border-bottom: none; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateX(-10px) }
  to { opacity: 1; transform: translateX(0) }
}

.tl-time {
  font-size: 11px;
  color: var(--accent);
  min-width: 70px;
  font-weight: 600;
  font-family: 'Syne', sans-serif;
}

.tl-text {
  flex: 1;
  font-size: 13px;
  font-weight: 500;
}

.tl-meta {
  font-size: 11px;
  color: var(--muted);
  text-align: right;
}

/* FOOTER */
.footer {
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.08em;
  padding: 32px 0 20px;
  border-top: 1px solid var(--border);
}

#last-update { color: var(--accent); font-weight: 600; }

/* LOADING */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 70vh;
  gap: 20px;
}

.spinner {
  width: 48px;
  height: 48px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg) } }

.loading-txt {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.08em;
  font-weight: 600;
  text-transform: uppercase;
}

/* MODAL */
.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(4px);
  z-index: 100;
  align-items: center;
  justify-content: center;
}

.modal-bg.open { display: flex; }

.modal {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  width: 360px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}

.modal h3 {
  font-family:'Syne', sans-serif;
  font-size: 14px;
  color: var(--accent);
  margin-bottom: 20px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.modal input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family:'Inter', sans-serif;
  font-size: 15px;
  padding: 12px 16px;
  border-radius: 12px;
  margin-bottom: 20px;
  transition: all 0.3s ease;
}

.modal input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 15px rgba(0, 217, 255, 0.2);
}

.modal-btns {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
}

.btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
  font-family:'Inter', sans-serif;
  font-size: 12px;
  padding: 10px 20px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.3s ease;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.btn.primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-color: transparent;
  color: #000;
  font-weight: 700;
}

.btn.primary:hover {
  box-shadow: 0 8px 20px rgba(0, 217, 255, 0.3);
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .hero {
    flex-direction: column;
    padding: 24px;
  }
  .hero-stats {
    flex-direction: column;
    width: 100%;
  }
  .hstat {
    flex: 1;
  }
  header {
    flex-direction: column;
    align-items: flex-start;
  }
  .header-controls {
    width: 100%;
    justify-content: space-between;
  }
}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spinner"></div><div class="loading-txt">CONECTARE LA FIREBASE...</div></div></div>

<!-- TARGET MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>SETEAZĂ TARGET ZILNIC</h3>
    <input type="number" id="target-input" placeholder="Ex: 10.00" step="0.01" min="0">
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">ANULEAZĂ</button>
      <button class="btn primary" onclick="saveTarget()">SALVEAZĂ</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({ databaseURL: "https://bmwadsstats-default-rtdb.firebaseio.com/" });
const db = getDatabase(app);

let state = {};
let charts = {};
let dailyTarget = parseFloat(localStorage.getItem('dailyTarget') || '10');
let currentTheme = localStorage.getItem('theme') || 'dark';

// THEME TOGGLE
function initTheme() {
  const html = document.documentElement;
  html.setAttribute('data-theme', currentTheme);
}

window.toggleTheme = (theme) => {
  currentTheme = theme;
  localStorage.setItem('theme', theme);
  document.documentElement.setAttribute('data-theme', theme);
  renderAll();
};

// MODAL
window.openModal = () => {
  document.getElementById('target-input').value = dailyTarget;
  document.getElementById('modal').classList.add('open');
};

window.closeModal = () => {
  document.getElementById('modal').classList.remove('open');
};

window.saveTarget = () => {
  const v = parseFloat(document.getElementById('target-input').value);
  if (!isNaN(v) && v > 0) {
    dailyTarget = v;
    localStorage.setItem('dailyTarget', v);
  }
  closeModal();
  renderAll();
};

// FORMATTING
function fmt(n) {
  n = parseFloat(n) || 0;
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return Math.round(n).toString();
}

function fmtRev(n) { return '$'+(parseFloat(n)||0).toFixed(4); }
function fmtRevShort(n) { return '$'+(parseFloat(n)||0).toFixed(2); }
function fmtECPM(n) { return '$'+(parseFloat(n)||0).toFixed(2); }
function fmtCTR(n) { return (parseFloat(n)||0).toFixed(2)+'%'; }
function today() { return new Date().toISOString().split('T')[0]; }

// DATA GETTERS
function getAdData(type) {
  return (state.total && state.total[type]) || {};
}

function getDailyAdData(type) {
  const d = state.daily && state.daily[today()];
  return (d && d[type]) || {};
}

function getTotalRev() {
  return (parseFloat((state.total||{}).revenue)||0);
}

function getTodayRev() {
  const d = state.daily && state.daily[today()];
  return parseFloat((d||{}).revenue)||0;
}

function getTotalSessions() {
  return parseInt((state.total||{}).sessions)||0;
}

function getTodaySessions() {
  const d = state.daily && state.daily[today()];
  return parseInt((d||{}).sessions)||0;
}

function getTotalImpressions() {
  const t = state.total || {};
  return (parseInt((t.interstitial||{}).impressions)||0) +
         (parseInt((t.banner||{}).impressions)||0) +
         (parseInt((t.rewarded||{}).impressions)||0);
}

function getTotalClicks() {
  const t = state.total || {};
  return (parseInt((t.interstitial||{}).clicks)||0) +
         (parseInt((t.banner||{}).clicks)||0) +
         (parseInt((t.rewarded||{}).clicks)||0);
}

function getDailyChartData() {
  const daily = state.daily || {};
  const days = Object.keys(daily).sort().slice(-7);
  return {
    labels: days.map(d => d.slice(5)),
    revenue: days.map(d => parseFloat((daily[d]||{}).revenue)||0),
    sessions: days.map(d => parseInt((daily[d]||{}).sessions)||0),
    impressions: days.map(d => {
      const dd = daily[d] || {};
      return (parseInt((dd.interstitial||{}).impressions)||0) +
             (parseInt((dd.banner||{}).impressions)||0) +
             (parseInt((dd.rewarded||{}).impressions)||0);
    })
  };
}

function getTopList(node, max=8) {
  const data = (state[node]) || {};
  return Object.entries(data)
    .map(([k,v]) => ({name: k.replace(/_/g,' '), val: parseInt(v)||0}))
    .sort((a,b) => b.val - a.val)
    .slice(0, max);
}

function getTimeline() {
  const tl = state.timeline || {};
  return Object.values(tl).sort((a,b) => b.time > a.time ? 1 : -1).slice(0,15);
}

function getBestDay() {
  const daily = state.daily || {};
  let best = 0;
  Object.values(daily).forEach(d => {
    const r = parseFloat((d||{}).revenue)||0;
    if (r > best) best = r;
  });
  return best;
}

function renderAll() {
  const todayRev = getTodayRev();
  const pct = Math.min((todayRev / dailyTarget) * 100, 100);
  const bestDay = getBestDay();
  const chartData = getDailyChartData();
  const topCountries = getTopList('countries');
  const topDevices = getTopList('devices');
  const timeline = getTimeline();

  const adTypes = [
    { key:'interstitial', label:'INTERSTITIAL', icon:'📺', cls:'interstitial' },
    { key:'banner', label:'BANNER', icon:'🖼️', cls:'banner' },
    { key:'rewarded', label:'REWARDED', icon:'🎁', cls:'rewarded' }
  ];

  document.getElementById('app').innerHTML = `
  <div class="wrap">
    <header>
      <div class="logo">BMW ADS<span>Realtime Analytics</span></div>
      <div class="header-controls">
        <div class="live-badge"><div class="dot"></div>LIVE</div>
        <div class="theme-toggle">
          <button class="theme-btn ${currentTheme === 'dark' ? 'active' : ''}" onclick="toggleTheme('dark')" title="Dark Mode">🌙</button>
          <button class="theme-btn ${currentTheme === 'light' ? 'active' : ''}" onclick="toggleTheme('light')" title="Light Mode">☀️</button>
        </div>
      </div>
    </header>

    <!-- HERO -->
    <div class="hero">
      <div class="hero-section">
        <div class="hero-lbl">Venit Total</div>
        <div class="hero-val">${fmtRevShort(getTotalRev())}</div>
        <div class="hero-today">+${fmtRevShort(todayRev)} astazi</div>
      </div>
      <div class="hero-stats">
        <div class="hstat"><div class="hstat-v">${fmt(getTotalImpressions())}</div><div class="hstat-l">Impresii</div></div>
        <div class="hstat"><div class="hstat-v">${fmt(getTotalClicks())}</div><div class="hstat-l">Clickuri</div></div>
        <div class="hstat"><div class="hstat-v">${fmt(getTotalSessions())}</div><div class="hstat-l">Sesiuni</div></div>
        <div class="hstat"><div class="hstat-v">${fmt(getTodaySessions())}</div><div class="hstat-l">Azi</div></div>
      </div>
    </div>

    <!-- TARGET PROGRESS -->
    <div class="target-card">
      <div class="target-hd">
        <div class="target-title">🎯 TARGET ZILNIC</div>
        <button class="target-edit" onclick="openModal()">EDIT TARGET</button>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar" style="width:${pct.toFixed(1)}%"></div>
      </div>
      <div class="progress-info">
        <span>${fmtRevShort(todayRev)} / ${fmtRevShort(dailyTarget)}</span>
        <span class="progress-pct">${pct.toFixed(1)}%</span>
      </div>
      <div class="record-row">🏆 RECORD ZILNIC: <span class="record-val">&nbsp;${fmtRevShort(bestDay)}</span></div>
    </div>

    <!-- AD CARDS -->
    <div class="section-title">📊 Statistici Per Tip Reclamă</div>
    <div class="cards">
      ${adTypes.map(a => {
        const d = getAdData(a.key);
        const dd = getDailyAdData(a.key);
        return `
        <div class="card ${a.cls}">
          <div class="card-hd">
            <div class="card-title">${a.label}</div>
            <div class="card-icon">${a.icon}</div>
          </div>
          <div class="srow"><span class="slbl">Impresii Total</span><span class="sval">${fmt(d.impressions||0)}</span></div>
          <div class="srow"><span class="slbl">Impresii Azi</span><span class="sval">${fmt(dd.impressions||0)}</span></div>
          <div class="srow"><span class="slbl">Clickuri Total</span><span class="sval">${fmt(d.clicks||0)}</span></div>
          <div class="srow"><span class="slbl">CTR</span><span class="sval ctr">${fmtCTR(d.ctr||0)}</span></div>
          <div class="srow"><span class="slbl">Venit Total</span><span class="sval rev">${fmtRev(d.revenue||0)}</span></div>
          <div class="srow"><span class="slbl">Venit Azi</span><span class="sval rev">${fmtRev(dd.revenue||0)}</span></div>
          <div class="srow"><span class="slbl">eCPM</span><span class="sval ecpm">${fmtECPM(d.ecpm||0)}</span></div>
        </div>`;
      }).join('')}
    </div>

    <!-- CHARTS -->
    <div class="section-title">📈 Grafice Ultimele 7 Zile</div>
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">💰 Venit Zilnic</div>
        <div class="chart-wrap"><canvas id="chartRevenue"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">👁️ Impresii Zilnice</div>
        <div class="chart-wrap"><canvas id="chartImpressions"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">👥 Sesiuni Zilnice</div>
        <div class="chart-wrap"><canvas id="chartSessions"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">🥧 Impresii Per Tip</div>
        <div class="chart-wrap"><canvas id="chartPie"></canvas></div>
      </div>
    </div>

    <!-- TOP LISTS -->
    <div class="section-title">🌍 Top Țări & Dispozitive</div>
    <div class="lists-grid">
      <div class="list-card">
        <div class="list-title">🌍 Top Țări</div>
        ${topCountries.length ? topCountries.map((c,i) => \`
          <div class="list-item">
            <div class="list-rank">#\${i+1}</div>
            <div class="list-name">\${c.name}</div>
            <div class="list-bar-wrap"><div class="list-bar" style="width:\${topCountries[0].val>0?(c.val/topCountries[0].val*100).toFixed(0):0}%"></div></div>
            <div class="list-val">\${fmt(c.val)}</div>
          </div>\`).join('') : '<div style="color:var(--muted);font-size:13px">Nu sunt date încă</div>'}
      </div>
      <div class="list-card">
        <div class="list-title">📱 Top Dispozitive</div>
        ${topDevices.length ? topDevices.map((d,i) => \`
          <div class="list-item">
            <div class="list-rank">#\${i+1}</div>
            <div class="list-name">\${d.name}</div>
            <div class="list-bar-wrap"><div class="list-bar" style="width:\${topDevices[0].val>0?(d.val/topDevices[0].val*100).toFixed(0):0}%;background:var(--purple)"></div></div>
            <div class="list-val">\${fmt(d.val)}</div>
          </div>\`).join('') : '<div style="color:var(--muted);font-size:13px">Nu sunt date încă</div>'}
      </div>
    </div>

    <!-- TIMELINE -->
    <div class="section-title">⚡ Activitate Live</div>
    <div class="timeline-card">
      <div class="timeline-title">Ultimele Evenimente</div>
      <div class="timeline-list">
        ${timeline.length ? timeline.map(e => \`
          <div class="tl-item">
            <div class="tl-time">\${e.time||''}</div>
            <div class="tl-text">\${e.text||''}</div>
            <div class="tl-meta">\${e.country||''} · \${(e.device||'').substring(0,15)}</div>
          </div>\`).join('') : '<div style="color:var(--muted);font-size:13px;padding:8px 0">Nicio activitate încă</div>'}
      </div>
    </div>

    <div class="footer">UPDATED: <span id="last-update">${new Date().toLocaleTimeString()}</span> &nbsp;·&nbsp; AUTO-REFRESH LIVE</div>
  </div>`;

  buildCharts(chartData);
}

function buildCharts(data) {
  const isDark = currentTheme === 'dark';
  const textColor = isDark ? '#64748b' : '#64748b';
  
  const chartDefaults = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { grid: { color: isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)' }, ticks: { color: textColor, font: { family: 'Inter', size: 11, weight: '500' } } },
      y: { grid: { color: isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)' }, ticks: { color: textColor, font: { family: 'Inter', size: 11, weight: '500' } } }
    }
  };

  ['chartRevenue','chartImpressions','chartSessions','chartPie'].forEach(id => {
    if (charts[id]) { charts[id].destroy(); delete charts[id]; }
  });

  const revCtx = document.getElementById('chartRevenue');
  if (revCtx) charts.chartRevenue = new Chart(revCtx, {
    type: 'bar',
    data: {
      labels: data.labels,
      datasets: [{ data: data.revenue, backgroundColor: 'rgba(251, 191, 36, 0.6)', borderColor: '#fbbf24', borderWidth: 1, borderRadius: 6 }]
    },
    options: chartDefaults
  });

  const impCtx = document.getElementById('chartImpressions');
  if (impCtx) charts.chartImpressions = new Chart(impCtx, {
    type: 'line',
    data: {
      labels: data.labels,
      datasets: [{ data: data.impressions, borderColor: '#00d9ff', backgroundColor: 'rgba(0, 217, 255, 0.1)', borderWidth: 2, fill: true, tension: 0.4, pointBackgroundColor: '#00d9ff', pointBorderColor: '#00d9ff' }]
    },
    options: chartDefaults
  });

  const sesCtx = document.getElementById('chartSessions');
  if (sesCtx) charts.chartSessions = new Chart(sesCtx, {
    type: 'line',
    data: {
      labels: data.labels,
      datasets: [{ data: data.sessions, borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', borderWidth: 2, fill: true, tension: 0.4, pointBackgroundColor: '#10b981', pointBorderColor: '#10b981' }]
    },
    options: chartDefaults
  });

  const t = state.total || {};
  const intImp = parseInt((t.interstitial||{}).impressions)||0;
  const banImp = parseInt((t.banner||{}).impressions)||0;
  const rewImp = parseInt((t.rewarded||{}).impressions)||0;
  const pieCtx = document.getElementById('chartPie');
  if (pieCtx) charts.chartPie = new Chart(pieCtx, {
    type: 'doughnut',
    data: {
      labels: ['Interstitial','Banner','Rewarded'],
      datasets: [{ data: [intImp, banImp, rewImp], backgroundColor: ['rgba(0, 217, 255, 0.7)','rgba(16, 185, 129, 0.7)','rgba(208, 132, 208, 0.7)'], borderColor: ['#00d9ff','#10b981','#d084d0'], borderWidth: 1 }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { color: textColor, font: { family: 'Inter', size: 11, weight: '500' }, padding: 16 } }
      }
    }
  });
}

// Initialize theme and listen
initTheme();
onValue(ref(db, '/'), (snap) => {
  state = snap.val() || {};
  renderAll();
});
</script>
</body>
</html>
