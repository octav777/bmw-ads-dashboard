!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMW Ads Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #050508;
  --surface: #0d0d14;
  --surface2: #13131e;
  --border: #1e1e2e;
  --accent: #4fc3f7;
  --accent2: #00e5ff;
  --green: #00e676;
  --yellow: #ffea00;
  --purple: #ce93d8;
  --red: #ff5252;
  --orange: #ff9800;
  --text: #e0e0e0;
  --muted: #555570;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  min-height: 100vh;
}
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(79,195,247,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(79,195,247,0.03) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
  z-index:0;
}
.wrap { position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:32px 20px; }

/* HEADER */
header { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; flex-wrap:wrap; gap:12px; }
.logo { font-family:'Orbitron',sans-serif; font-weight:900; font-size:clamp(16px,3vw,26px); color:var(--accent2); text-shadow:0 0 30px rgba(0,229,255,0.5); letter-spacing:0.1em; }
.logo span { display:block; font-size:0.5em; color:var(--muted); letter-spacing:0.3em; margin-top:2px; }
.live-badge { display:flex; align-items:center; gap:8px; background:rgba(0,230,118,0.08); border:1px solid rgba(0,230,118,0.3); border-radius:20px; padding:6px 16px; font-size:11px; color:var(--green); letter-spacing:0.2em; }
.dot { width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 1.5s ease-in-out infinite; box-shadow:0 0 8px var(--green); }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

/* HERO */
.hero { background:linear-gradient(135deg,#0d1520,#0a0d1a); border:1px solid rgba(79,195,247,0.2); border-radius:16px; padding:32px; margin-bottom:24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:24px; position:relative; overflow:hidden; }
.hero::before { content:''; position:absolute; top:-40%; right:-5%; width:300px; height:300px; background:radial-gradient(circle,rgba(79,195,247,0.06),transparent 70%); pointer-events:none; }
.hero-lbl { font-size:10px; letter-spacing:0.3em; color:var(--muted); margin-bottom:6px; }
.hero-val { font-family:'Orbitron',sans-serif; font-size:clamp(28px,5vw,48px); font-weight:900; color:var(--accent2); text-shadow:0 0 40px rgba(0,229,255,0.4); }
.hero-today { font-size:12px; color:var(--green); margin-top:4px; }
.hero-stats { display:flex; gap:28px; flex-wrap:wrap; }
.hstat { text-align:center; }
.hstat-v { font-family:'Orbitron',sans-serif; font-size:20px; font-weight:700; }
.hstat-l { font-size:9px; color:var(--muted); letter-spacing:0.2em; margin-top:3px; }

/* SECTION TITLE */
.section-title { font-family:'Orbitron',sans-serif; font-size:11px; letter-spacing:0.3em; color:var(--muted); margin:28px 0 12px; border-bottom:1px solid var(--border); padding-bottom:8px; }

/* AD CARDS */
.cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; margin-bottom:24px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; position:relative; overflow:hidden; transition:border-color .3s,transform .3s; }
.card:hover { border-color:rgba(79,195,247,0.25); transform:translateY(-2px); }
.card::after { content:''; position:absolute; top:0; left:0; right:0; height:2px; border-radius:12px 12px 0 0; }
.card.interstitial::after { background:linear-gradient(90deg,var(--accent),transparent); }
.card.banner::after { background:linear-gradient(90deg,var(--green),transparent); }
.card.rewarded::after { background:linear-gradient(90deg,var(--purple),transparent); }
.card-hd { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.card-title { font-family:'Orbitron',sans-serif; font-size:12px; font-weight:700; letter-spacing:0.15em; }
.card.interstitial .card-title { color:var(--accent); }
.card.banner .card-title { color:var(--green); }
.card.rewarded .card-title { color:var(--purple); }
.card-icon { font-size:18px; opacity:.6; }
.srow { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
.srow:last-child { border-bottom:none; }
.slbl { font-size:10px; color:var(--muted); letter-spacing:0.15em; }
.sval { font-family:'Orbitron',sans-serif; font-size:14px; font-weight:700; transition:color .3s; }
.sval.rev { color:var(--yellow); }
.sval.ecpm { color:var(--accent); }
.sval.ctr { color:var(--orange); }

/* TARGET PROGRESS */
.target-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:24px; }
.target-hd { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.target-title { font-family:'Orbitron',sans-serif; font-size:12px; color:var(--accent2); letter-spacing:0.15em; }
.target-edit { background:none; border:1px solid var(--border); color:var(--muted); font-family:'Share Tech Mono',monospace; font-size:11px; padding:4px 10px; border-radius:6px; cursor:pointer; }
.target-edit:hover { border-color:var(--accent); color:var(--accent); }
.progress-wrap { background:rgba(255,255,255,0.04); border-radius:8px; height:12px; overflow:hidden; margin-bottom:8px; }
.progress-bar { height:100%; border-radius:8px; transition:width 1s ease; background:linear-gradient(90deg,var(--accent),var(--accent2)); box-shadow:0 0 10px rgba(0,229,255,0.3); }
.progress-info { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); }
.progress-pct { color:var(--accent2); font-family:'Orbitron',sans-serif; font-size:13px; }

/* RECORD */
.record-row { display:flex; align-items:center; gap:8px; margin-top:12px; font-size:11px; color:var(--muted); }
.record-val { color:var(--yellow); font-family:'Orbitron',sans-serif; }

/* CHARTS GRID */
.charts-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(340px,1fr)); gap:16px; margin-bottom:24px; }
.chart-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; }
.chart-title { font-family:'Orbitron',sans-serif; font-size:11px; color:var(--muted); letter-spacing:0.2em; margin-bottom:16px; }
.chart-wrap { position:relative; height:200px; }

/* TOP LISTS */
.lists-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; margin-bottom:24px; }
.list-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; }
.list-title { font-family:'Orbitron',sans-serif; font-size:11px; color:var(--muted); letter-spacing:0.2em; margin-bottom:16px; }
.list-item { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
.list-item:last-child { border-bottom:none; }
.list-rank { font-family:'Orbitron',sans-serif; font-size:11px; color:var(--muted); width:20px; }
.list-name { flex:1; font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.list-bar-wrap { width:80px; height:4px; background:rgba(255,255,255,0.06); border-radius:4px; overflow:hidden; }
.list-bar { height:100%; border-radius:4px; background:var(--accent); }
.list-val { font-family:'Orbitron',sans-serif; font-size:12px; color:var(--text); min-width:32px; text-align:right; }

/* TIMELINE */
.timeline-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:24px; }
.timeline-title { font-family:'Orbitron',sans-serif; font-size:11px; color:var(--muted); letter-spacing:0.2em; margin-bottom:16px; }
.timeline-list { max-height:280px; overflow-y:auto; }
.timeline-list::-webkit-scrollbar { width:4px; }
.timeline-list::-webkit-scrollbar-track { background:transparent; }
.timeline-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.tl-item { display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.04); animation:fadeIn .4s ease; }
.tl-item:last-child { border-bottom:none; }
@keyframes fadeIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
.tl-time { font-size:10px; color:var(--muted); min-width:60px; }
.tl-text { flex:1; font-size:12px; }
.tl-meta { font-size:10px; color:var(--muted); text-align:right; }

/* FOOTER */
.footer { text-align:center; font-size:10px; color:var(--muted); letter-spacing:0.2em; padding:20px 0; }
#last-update { color:var(--accent); }

/* LOADING */
.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; height:70vh; gap:16px; }
.spinner { width:40px; height:40px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-txt { font-size:11px; color:var(--muted); letter-spacing:0.3em; }

/* MODAL */
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100; align-items:center; justify-content:center; }
.modal-bg.open { display:flex; }
.modal { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:28px; width:320px; }
.modal h3 { font-family:'Orbitron',sans-serif; font-size:13px; color:var(--accent); margin-bottom:16px; }
.modal input { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); font-family:'Share Tech Mono',monospace; font-size:14px; padding:10px; border-radius:8px; margin-bottom:16px; }
.modal input:focus { outline:none; border-color:var(--accent); }
.modal-btns { display:flex; gap:10px; justify-content:flex-end; }
.btn { background:none; border:1px solid var(--border); color:var(--text); font-family:'Share Tech Mono',monospace; font-size:12px; padding:8px 16px; border-radius:8px; cursor:pointer; }
.btn.primary { background:var(--accent); border-color:var(--accent); color:#000; font-weight:700; }
.btn:hover { opacity:.8; }
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spinner"></div><div class="loading-txt">CONNECTING TO FIREBASE...</div></div></div>

<!-- TARGET MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>SET DAILY TARGET</h3>
    <input type="number" id="target-input" placeholder="Ex: 10.00" step="0.01" min="0">
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">CANCEL</button>
      <button class="btn primary" onclick="saveTarget()">SAVE</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({ databaseURL: "https://bmwadsstats-default-rtdb.firebaseio.com/" });
const db = getDatabase(app);

let state = {};
let charts = {};
let dailyTarget = parseFloat(localStorage.getItem('dailyTarget') || '10');

window.openModal = () => {
  document.getElementById('target-input').value = dailyTarget;
  document.getElementById('modal').classList.add('open');
};
window.closeModal = () => document.getElementById('modal').classList.remove('open');
window.saveTarget = () => {
  const v = parseFloat(document.getElementById('target-input').value);
  if (!isNaN(v) && v > 0) { dailyTarget = v; localStorage.setItem('dailyTarget', v); }
  closeModal();
  renderAll();
};

function fmt(n) {
  n = parseFloat(n) || 0;
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return Math.round(n).toString();
}
function fmtRev(n) { return '$'+(parseFloat(n)||0).toFixed(4); }
function fmtRevShort(n) { return '$'+(parseFloat(n)||0).toFixed(2); }
function fmtECPM(n) { return '$'+(parseFloat(n)||0).toFixed(2); }
function fmtCTR(n) { return (parseFloat(n)||0).toFixed(2)+'%'; }
function today() { return new Date().toISOString().split('T')[0]; }

function getAdData(type) {
  return (state.total && state.total[type]) || {};
}
function getDailyAdData(type) {
  const d = state.daily && state.daily[today()];
  return (d && d[type]) || {};
}
function getTotalRev() {
  return (parseFloat((state.total||{}).revenue)||0);
}
function getTodayRev() {
  const d = state.daily && state.daily[today()];
  return parseFloat((d||{}).revenue)||0;
}
function getTotalSessions() { return parseInt((state.total||{}).sessions)||0; }
function getTodaySessions() {
  const d = state.daily && state.daily[today()];
  return parseInt((d||{}).sessions)||0;
}
function getTotalImpressions() {
  const t = state.total || {};
  return (parseInt((t.interstitial||{}).impressions)||0) +
         (parseInt((t.banner||{}).impressions)||0) +
         (parseInt((t.rewarded||{}).impressions)||0);
}
function getTotalClicks() {
  const t = state.total || {};
  return (parseInt((t.interstitial||{}).clicks)||0) +
         (parseInt((t.banner||{}).clicks)||0) +
         (parseInt((t.rewarded||{}).clicks)||0);
}

// DAILY CHART DATA
function getDailyChartData() {
  const daily = state.daily || {};
  const days = Object.keys(daily).sort().slice(-7);
  return {
    labels: days.map(d => d.slice(5)),
    revenue: days.map(d => parseFloat((daily[d]||{}).revenue)||0),
    sessions: days.map(d => parseInt((daily[d]||{}).sessions)||0),
    impressions: days.map(d => {
      const dd = daily[d] || {};
      return (parseInt((dd.interstitial||{}).impressions)||0) +
             (parseInt((dd.banner||{}).impressions)||0) +
             (parseInt((dd.rewarded||{}).impressions)||0);
    })
  };
}

// TOP LISTS
function getTopList(node, max=8) {
  const data = (state[node]) || {};
  return Object.entries(data)
    .map(([k,v]) => ({name: k.replace(/_/g,' '), val: parseInt(v)||0}))
    .sort((a,b) => b.val - a.val)
    .slice(0, max);
}

// TIMELINE
function getTimeline() {
  const tl = state.timeline || {};
  return Object.values(tl).sort((a,b) => b.time > a.time ? 1 : -1).slice(0,15);
}

// RECORD
function getBestDay() {
  const daily = state.daily || {};
  let best = 0;
  Object.values(daily).forEach(d => {
    const r = parseFloat((d||{}).revenue)||0;
    if (r > best) best = r;
  });
  return best;
}

function renderAll() {
  const todayRev = getTodayRev();
  const pct = Math.min((todayRev / dailyTarget) * 100, 100);
  const bestDay = getBestDay();
  const chartData = getDailyChartData();
  const topCountries = getTopList('countries');
  const topDevices = getTopList('devices');
  const timeline = getTimeline();

  const adTypes = [
    { key:'interstitial', label:'INTERSTITIAL', icon:'📺', cls:'interstitial' },
    { key:'banner', label:'BANNER', icon:'🖼️', cls:'banner' },
    { key:'rewarded', label:'REWARDED', icon:'🎁', cls:'rewarded' }
  ];

  document.getElementById('app').innerHTML = `
  <div class="wrap">
    <header>
      <div class="logo">BMW ADS STATS<span>REALTIME DASHBOARD</span></div>
      <div class="live-badge"><div class="dot"></div>LIVE</div>
    </header>

    <!-- HERO -->
    <div class="hero">
      <div>
        <div class="hero-lbl">VENIT TOTAL</div>
        <div class="hero-val">${fmtRevShort(getTotalRev())}</div>
        <div class="hero-today">+${fmtRevShort(todayRev)} AZI</div>
      </div>
      <div class="hero-stats">
        <div class="hstat"><div class="hstat-v">${fmt(getTotalImpressions())}</div><div class="hstat-l">IMPRESII</div></div>
        <div class="hstat"><div class="hstat-v">${fmt(getTotalClicks())}</div><div class="hstat-l">CLICKURI</div></div>
        <div class="hstat"><div class="hstat-v">${fmt(getTotalSessions())}</div><div class="hstat-l">SESIUNI</div></div>
        <div class="hstat"><div class="hstat-v">${fmt(getTodaySessions())}</div><div class="hstat-l">AZI</div></div>
      </div>
    </div>

    <!-- TARGET PROGRESS -->
    <div class="target-card">
      <div class="target-hd">
        <div class="target-title">🎯 TARGET ZILNIC</div>
        <button class="target-edit" onclick="openModal()">EDIT TARGET</button>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar" style="width:${pct.toFixed(1)}%"></div>
      </div>
      <div class="progress-info">
        <span>${fmtRevShort(todayRev)} / ${fmtRevShort(dailyTarget)}</span>
        <span class="progress-pct">${pct.toFixed(1)}%</span>
      </div>
      <div class="record-row">🏆 RECORD ZILNIC: <span class="record-val">&nbsp;${fmtRevShort(bestDay)}</span></div>
    </div>

    <!-- AD CARDS -->
    <div class="section-title">📊 STATISTICI PER TIP RECLAMĂ</div>
    <div class="cards">
      ${adTypes.map(a => {
        const d = getAdData(a.key);
        const dd = getDailyAdData(a.key);
        return `
        <div class="card ${a.cls}">
          <div class="card-hd">
            <div class="card-title">${a.label}</div>
            <div class="card-icon">${a.icon}</div>
          </div>
          <div class="srow"><span class="slbl">IMPRESII TOTAL</span><span class="sval">${fmt(d.impressions||0)}</span></div>
          <div class="srow"><span class="slbl">IMPRESII AZI</span><span class="sval">${fmt(dd.impressions||0)}</span></div>
          <div class="srow"><span class="slbl">CLICKURI TOTAL</span><span class="sval">${fmt(d.clicks||0)}</span></div>
          <div class="srow"><span class="slbl">CTR</span><span class="sval ctr">${fmtCTR(d.ctr||0)}</span></div>
          <div class="srow"><span class="slbl">VENIT TOTAL</span><span class="sval rev">${fmtRev(d.revenue||0)}</span></div>
          <div class="srow"><span class="slbl">VENIT AZI</span><span class="sval rev">${fmtRev(dd.revenue||0)}</span></div>
          <div class="srow"><span class="slbl">eCPM</span><span class="sval ecpm">${fmtECPM(d.ecpm||0)}</span></div>
        </div>`;
      }).join('')}
    </div>

    <!-- CHARTS -->
    <div class="section-title">📈 GRAFICE ULTIMELE 7 ZILE</div>
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">💰 VENIT ZILNIC ($)</div>
        <div class="chart-wrap"><canvas id="chartRevenue"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">👁️ IMPRESII ZILNICE</div>
        <div class="chart-wrap"><canvas id="chartImpressions"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">👥 SESIUNI ZILNICE</div>
        <div class="chart-wrap"><canvas id="chartSessions"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">🥧 IMPRESII PE TIP</div>
        <div class="chart-wrap"><canvas id="chartPie"></canvas></div>
      </div>
    </div>

    <!-- TOP LISTS -->
    <div class="section-title">🌍 TOP ȚĂRI & DISPOZITIVE</div>
    <div class="lists-grid">
      <div class="list-card">
        <div class="list-title">🌍 TOP ȚĂRI</div>
        ${topCountries.length ? topCountries.map((c,i) => `
          <div class="list-item">
            <div class="list-rank">#${i+1}</div>
            <div class="list-name">${c.name}</div>
            <div class="list-bar-wrap"><div class="list-bar" style="width:${topCountries[0].val>0?(c.val/topCountries[0].val*100).toFixed(0):0}%"></div></div>
            <div class="list-val">${fmt(c.val)}</div>
          </div>`).join('') : '<div style="color:var(--muted);font-size:12px">Nu sunt date încă</div>'}
      </div>
      <div class="list-card">
        <div class="list-title">📱 TOP DISPOZITIVE</div>
        ${topDevices.length ? topDevices.map((d,i) => `
          <div class="list-item">
            <div class="list-rank">#${i+1}</div>
            <div class="list-name">${d.name}</div>
            <div class="list-bar-wrap"><div class="list-bar" style="width:${topDevices[0].val>0?(d.val/topDevices[0].val*100).toFixed(0):0}%;background:var(--purple)"></div></div>
            <div class="list-val">${fmt(d.val)}</div>
          </div>`).join('') : '<div style="color:var(--muted);font-size:12px">Nu sunt date încă</div>'}
      </div>
    </div>

    <!-- TIMELINE -->
    <div class="section-title">⚡ ACTIVITATE LIVE</div>
    <div class="timeline-card">
      <div class="timeline-title">ULTIMELE EVENIMENTE</div>
      <div class="timeline-list">
        ${timeline.length ? timeline.map(e => `
          <div class="tl-item">
            <div class="tl-time">${e.time||''}</div>
            <div class="tl-text">${e.text||''}</div>
            <div class="tl-meta">${e.country||''} · ${(e.device||'').substring(0,15)}</div>
          </div>`).join('') : '<div style="color:var(--muted);font-size:12px;padding:8px 0">Nicio activitate încă</div>'}
      </div>
    </div>

    <div class="footer">LAST UPDATE: <span id="last-update">${new Date().toLocaleTimeString()}</span> &nbsp;·&nbsp; AUTO-REFRESH LIVE</div>
  </div>`;

  // CHARTS
  buildCharts(chartData);
}

function buildCharts(data) {
  const chartDefaults = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#555570', font: { family: 'Share Tech Mono', size: 10 } } },
      y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#555570', font: { family: 'Share Tech Mono', size: 10 } } }
    }
  };

  // Destroy old charts
  ['chartRevenue','chartImpressions','chartSessions','chartPie'].forEach(id => {
    if (charts[id]) { charts[id].destroy(); delete charts[id]; }
  });

  const revCtx = document.getElementById('chartRevenue');
  if (revCtx) charts.chartRevenue = new Chart(revCtx, {
    type: 'bar',
    data: {
      labels: data.labels,
      datasets: [{ data: data.revenue, backgroundColor: 'rgba(255,234,0,0.5)', borderColor: '#ffea00', borderWidth: 1, borderRadius: 4 }]
    },
    options: chartDefaults
  });

  const impCtx = document.getElementById('chartImpressions');
  if (impCtx) charts.chartImpressions = new Chart(impCtx, {
    type: 'line',
    data: {
      labels: data.labels,
      datasets: [{ data: data.impressions, borderColor: '#4fc3f7', backgroundColor: 'rgba(79,195,247,0.1)', borderWidth: 2, fill: true, tension: 0.4, pointBackgroundColor: '#4fc3f7' }]
    },
    options: chartDefaults
  });

  const sesCtx = document.getElementById('chartSessions');
  if (sesCtx) charts.chartSessions = new Chart(sesCtx, {
    type: 'line',
    data: {
      labels: data.labels,
      datasets: [{ data: data.sessions, borderColor: '#00e676', backgroundColor: 'rgba(0,230,118,0.1)', borderWidth: 2, fill: true, tension: 0.4, pointBackgroundColor: '#00e676' }]
    },
    options: chartDefaults
  });

  const t = state.total || {};
  const intImp = parseInt((t.interstitial||{}).impressions)||0;
  const banImp = parseInt((t.banner||{}).impressions)||0;
  const rewImp = parseInt((t.rewarded||{}).impressions)||0;
  const pieCtx = document.getElementById('chartPie');
  if (pieCtx) charts.chartPie = new Chart(pieCtx, {
    type: 'doughnut',
    data: {
      labels: ['Interstitial','Banner','Rewarded'],
      datasets: [{ data: [intImp, banImp, rewImp], backgroundColor: ['rgba(79,195,247,0.7)','rgba(0,230,118,0.7)','rgba(206,147,216,0.7)'], borderColor: ['#4fc3f7','#00e676','#ce93d8'], borderWidth: 1 }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { color: '#555570', font: { family: 'Share Tech Mono', size: 10 }, padding: 12 } }
      }
    }
  });
}

// FIREBASE LISTENER
onValue(ref(db, '/'), (snap) => {
  state = snap.val() || {};
  renderAll();
});
</script>
</body>
</html>
