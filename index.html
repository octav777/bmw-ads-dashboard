<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMW Ads Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050508;
    --surface: #0d0d14;
    --surface2: #13131e;
    --border: #1e1e2e;
    --accent: #4fc3f7;
    --accent2: #00e5ff;
    --green: #00e676;
    --yellow: #ffea00;
    --purple: #ce93d8;
    --red: #ff5252;
    --text: #e0e0e0;
    --muted: #555570;
    --glow: 0 0 20px rgba(79,195,247,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BG */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,195,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,195,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 48px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(18px, 4vw, 28px);
    letter-spacing: 0.1em;
    color: var(--accent2);
    text-shadow: 0 0 30px rgba(0,229,255,0.5);
  }

  .logo span {
    color: var(--muted);
    font-size: 0.55em;
    display: block;
    letter-spacing: 0.3em;
    margin-top: 2px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,230,118,0.08);
    border: 1px solid rgba(0,230,118,0.3);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 12px;
    color: var(--green);
    letter-spacing: 0.2em;
  }

  .live-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 1.5s ease-in-out infinite;
    box-shadow: 0 0 8px var(--green);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* TOTAL REVENUE HERO */
  .hero {
    background: linear-gradient(135deg, #0d1520 0%, #0a0d1a 100%);
    border: 1px solid rgba(79,195,247,0.2);
    border-radius: 16px;
    padding: 36px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 24px;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -10%;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(79,195,247,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-label {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .hero-value {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 900;
    color: var(--accent2);
    text-shadow: 0 0 40px rgba(0,229,255,0.4);
    letter-spacing: 0.05em;
  }

  .hero-stats {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
  }

  .hero-stat {
    text-align: center;
  }

  .hero-stat-val {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }

  .hero-stat-lbl {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.2em;
    margin-top: 4px;
  }

  /* AD CARDS GRID */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 32px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.3s;
  }

  .card:hover {
    border-color: rgba(79,195,247,0.3);
    transform: translateY(-2px);
  }

  .card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 12px 12px 0 0;
  }

  .card.interstitial::after { background: linear-gradient(90deg, var(--accent), transparent); }
  .card.banner::after { background: linear-gradient(90deg, var(--green), transparent); }
  .card.rewarded::after { background: linear-gradient(90deg, var(--purple), transparent); }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .card-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.15em;
  }

  .card.interstitial .card-title { color: var(--accent); }
  .card.banner .card-title { color: var(--green); }
  .card.rewarded .card-title { color: var(--purple); }

  .card-icon {
    font-size: 20px;
    opacity: 0.6;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .stat-row:last-child { border-bottom: none; }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
  }

  .stat-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    transition: color 0.3s;
  }

  .stat-value.flash {
    color: var(--accent2);
    text-shadow: 0 0 10px rgba(0,229,255,0.5);
  }

  .stat-value.revenue { color: var(--yellow); }
  .stat-value.ecpm { color: var(--accent); }

  /* LAST UPDATE */
  .footer {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.2em;
    margin-top: 16px;
  }

  #last-update { color: var(--accent); }

  /* LOADING */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 60vh;
    flex-direction: column;
    gap: 16px;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.3em;
  }

  /* RESPONSIVE */
  @media (max-width: 500px) {
    .hero { padding: 24px; }
    .hero-stats { gap: 20px; }
  }
</style>
</head>
<body>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text">CONNECTING TO FIREBASE...</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ─── FIREBASE CONFIG ───
  const firebaseConfig = {
    databaseURL: "https://bmwadsstats-default-rtdb.firebaseio.com/"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ─── STATE ───
  let data = {
    sessions: 0,
    interstitial: { impressions: 0, clicks: 0, revenue: 0, ecpm: 0 },
    banner: { impressions: 0, clicks: 0, revenue: 0, ecpm: 0 },
    rewarded: { impressions: 0, clicks: 0, revenue: 0, ecpm: 0 }
  };

  // ─── RENDER ───
  function fmt(n) {
    if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n/1000).toFixed(1) + 'K';
    return Math.round(n).toString();
  }

  function fmtRev(n) { return '$' + (n || 0).toFixed(4); }
  function fmtECPM(n) { return '$' + (n || 0).toFixed(2); }

  function totalRevenue() {
    return (data.interstitial.revenue || 0) +
           (data.banner.revenue || 0) +
           (data.rewarded.revenue || 0);
  }

  function totalImpressions() {
    return (data.interstitial.impressions || 0) +
           (data.banner.impressions || 0) +
           (data.rewarded.impressions || 0);
  }

  function totalClicks() {
    return (data.interstitial.clicks || 0) +
           (data.banner.clicks || 0) +
           (data.rewarded.clicks || 0);
  }

  function render() {
    document.getElementById('app').innerHTML = `
      <div class="container">
        <header>
          <div class="logo">
            BMW ADS STATS
            <span>REALTIME DASHBOARD</span>
          </div>
          <div class="live-badge">
            <div class="live-dot"></div>
            LIVE
          </div>
        </header>

        <div class="hero">
          <div>
            <div class="hero-label">VENIT TOTAL ESTIMAT</div>
            <div class="hero-value" id="total-rev">${fmtRev(totalRevenue())}</div>
          </div>
          <div class="hero-stats">
            <div class="hero-stat">
              <div class="hero-stat-val">${fmt(totalImpressions())}</div>
              <div class="hero-stat-lbl">IMPRESII</div>
            </div>
            <div class="hero-stat">
              <div class="hero-stat-val">${fmt(totalClicks())}</div>
              <div class="hero-stat-lbl">CLICKURI</div>
            </div>
            <div class="hero-stat">
              <div class="hero-stat-val">${fmt(data.sessions)}</div>
              <div class="hero-stat-lbl">SESIUNI</div>
            </div>
          </div>
        </div>

        <div class="cards">
          ${adCard('interstitial', '📺', 'INTERSTITIAL', data.interstitial)}
          ${adCard('banner', '🖼️', 'BANNER', data.banner)}
          ${adCard('rewarded', '🎁', 'REWARDED', data.rewarded)}
        </div>

        <div class="footer">
          LAST UPDATE: <span id="last-update">${new Date().toLocaleTimeString()}</span>
          &nbsp;·&nbsp; AUTO-REFRESH LIVE
        </div>
      </div>
    `;
  }

  function adCard(type, icon, title, d) {
    return `
      <div class="card ${type}">
        <div class="card-header">
          <div class="card-title">${title}</div>
          <div class="card-icon">${icon}</div>
        </div>
        <div class="stat-row">
          <div class="stat-label">IMPRESII</div>
          <div class="stat-value" id="${type}-imp">${fmt(d.impressions || 0)}</div>
        </div>
        <div class="stat-row">
          <div class="stat-label">CLICKURI</div>
          <div class="stat-value" id="${type}-clk">${fmt(d.clicks || 0)}</div>
        </div>
        <div class="stat-row">
          <div class="stat-label">VENIT ESTIMAT</div>
          <div class="stat-value revenue" id="${type}-rev">${fmtRev(d.revenue || 0)}</div>
        </div>
        <div class="stat-row">
          <div class="stat-label">eCPM</div>
          <div class="stat-value ecpm" id="${type}-ecpm">${fmtECPM(d.ecpm || 0)}</div>
        </div>
      </div>
    `;
  }

  // ─── FIREBASE LISTENER ───
  const rootRef = ref(db, '/');
  onValue(rootRef, (snapshot) => {
    const val = snapshot.val() || {};

    data.sessions = val.sessions || 0;
    data.interstitial = val.interstitial || { impressions: 0, clicks: 0, revenue: 0, ecpm: 0 };
    data.banner = val.banner || { impressions: 0, clicks: 0, revenue: 0, ecpm: 0 };
    data.rewarded = val.rewarded || { impressions: 0, clicks: 0, revenue: 0, ecpm: 0 };

    render();
  });
</script>
</body>
</html>
