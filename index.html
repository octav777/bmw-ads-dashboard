<!DOCTYPE html>
<html lang="ro" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ads Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#05070d;--panel:#0b0f1a;--panel2:#0e1322;--panel3:#111828;
  --line:rgba(255,255,255,0.055);--line2:rgba(255,255,255,0.09);
  --blue:#3b82f6;--blue2:#60a5fa;--blue-dim:rgba(59,130,246,0.15);--blue-glow:rgba(59,130,246,0.3);
  --emerald:#10b981;--amber:#f59e0b;--violet:#8b5cf6;--rose:#f43f5e;
  --text:#e2e8f4;--text2:#64748b;--text3:#334155;
  --mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;
}
html[data-theme="light"] {
  --bg:#f1f5fb;--panel:#ffffff;--panel2:#f8fafd;--panel3:#f0f4fa;
  --line:rgba(0,0,0,0.06);--line2:rgba(0,0,0,0.1);
  --blue:#2563eb;--blue2:#3b82f6;--blue-dim:rgba(37,99,235,0.08);--blue-glow:rgba(37,99,235,0.2);
  --emerald:#059669;--amber:#d97706;--violet:#7c3aed;--rose:#e11d48;
  --text:#0f172a;--text2:#64748b;--text3:#94a3b8;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--sans);font-weight:300;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.5;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.007) 2px,rgba(255,255,255,0.007) 4px);pointer-events:none;z-index:0;}
html[data-theme="light"] body::before,html[data-theme="light"] body::after{display:none;}
.shell{position:relative;z-index:1;max-width:1340px;margin:0 auto;padding:32px 28px 60px;}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:16px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:14px;}
.brand-mark{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .3s;}
.brand-name{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.01em;}
.brand-sub{font-size:11px;font-weight:300;color:var(--text2);margin-top:2px;letter-spacing:0.06em;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.status-chip{display:flex;align-items:center;gap:7px;padding:7px 14px;border:1px solid rgba(16,185,129,0.25);border-radius:6px;background:rgba(16,185,129,0.07);font-family:var(--mono);font-size:11px;color:var(--emerald);letter-spacing:0.08em;}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--emerald);box-shadow:0 0 8px var(--emerald);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.7);}}
.icon-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid var(--line2);border-radius:7px;background:transparent;font-family:var(--mono);font-size:10px;letter-spacing:0.08em;color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap;}
.icon-btn:hover{border-color:var(--blue);color:var(--blue2);}
.icon-btn.on{border-color:var(--violet);color:var(--violet);background:rgba(139,92,246,0.08);}
.theme-sw{display:flex;background:var(--panel);border:1px solid var(--line2);border-radius:8px;padding:4px;gap:2px;}
.tsw{width:32px;height:32px;border:none;background:transparent;border-radius:5px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.tsw.on{background:var(--blue-dim);}

/* APP BAR */
.app-bar{display:flex;align-items:center;gap:6px;margin-bottom:16px;padding:10px 14px;background:var(--panel);border:1px solid var(--line2);border-radius:12px;flex-wrap:wrap;}
.app-bar-lbl{font-family:var(--mono);font-size:9px;letter-spacing:0.2em;color:var(--text3);text-transform:uppercase;margin-right:6px;flex-shrink:0;}
.app-chip{position:relative;display:flex;align-items:center;gap:7px;padding:7px 14px;border:1px solid var(--line);border-radius:7px;background:transparent;cursor:pointer;transition:all .2s;font-family:var(--mono);font-size:11px;color:var(--text2);letter-spacing:0.04em;user-select:none;}
.app-chip:hover{border-color:var(--line2);color:var(--text);background:var(--panel2);}
.app-chip.active{border-color:var(--blue);color:var(--blue2);background:var(--blue-dim);}
.app-chip-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.app-del{display:none;position:absolute;top:-7px;right:-7px;width:17px;height:17px;border-radius:50%;background:var(--rose);border:none;color:#fff;font-size:9px;cursor:pointer;align-items:center;justify-content:center;font-weight:700;line-height:1;}
.app-chip:hover .app-del{display:flex;}
.add-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border:1px dashed var(--line2);border-radius:7px;background:transparent;cursor:pointer;font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:0.04em;transition:all .2s;white-space:nowrap;}
.add-btn:hover{border-color:var(--blue);color:var(--blue2);background:var(--blue-dim);}

/* COMPARE BANNER */
.cmp-banner{display:flex;align-items:center;gap:10px;padding:10px 16px;background:rgba(139,92,246,0.07);border:1px solid rgba(139,92,246,0.2);border-radius:10px;margin-bottom:14px;flex-wrap:wrap;}
.cmp-banner-txt{font-family:var(--mono);font-size:11px;color:var(--text2);}
.cmp-banner-txt b{color:var(--violet);}
.cmp-exit{margin-left:auto;background:transparent;border:1px solid rgba(139,92,246,0.3);border-radius:5px;padding:5px 12px;font-family:var(--mono);font-size:10px;color:var(--violet);cursor:pointer;transition:all .2s;}
.cmp-exit:hover{background:rgba(139,92,246,0.15);}

/* PERIOD */
.period-row{display:flex;align-items:center;gap:4px;margin-bottom:20px;flex-wrap:wrap;}
.ptab{padding:8px 16px;border:1px solid var(--line);border-radius:6px;background:transparent;font-family:var(--mono);font-size:11px;letter-spacing:0.06em;color:var(--text2);cursor:pointer;transition:all .2s;}
.ptab:hover{border-color:var(--line2);color:var(--text);}
.ptab.on{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 2px 12px var(--blue-glow);}
.period-info{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:0.08em;}

/* HERO */
.hero{display:grid;grid-template-columns:1fr auto;gap:1px;background:var(--line);border:1px solid var(--line2);border-radius:14px;overflow:hidden;margin-bottom:12px;}
.hero-main{background:var(--panel);padding:36px 40px;position:relative;overflow:hidden;}
.hero-main::before{content:'';position:absolute;top:-80px;left:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(59,130,246,0.07) 0%,transparent 70%);pointer-events:none;}
.hero-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:0.18em;color:var(--text3);text-transform:uppercase;margin-bottom:12px;}
.hero-amount{font-family:var(--mono);font-size:clamp(44px,7vw,68px);font-weight:700;color:var(--blue2);line-height:1;letter-spacing:-0.03em;}
.hero-sub{display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-size:12px;color:var(--emerald);}
.hero-sparkline{position:absolute;right:0;bottom:0;width:55%;height:100%;opacity:.55;cursor:crosshair;}
html[data-theme="light"] .hero-sparkline{opacity:.35;}
.spark-tooltip{position:absolute;background:rgba(11,15,26,0.92);border:1px solid var(--line2);border-radius:7px;padding:8px 12px;pointer-events:none;transform:translateX(-50%);white-space:nowrap;z-index:10;}
html[data-theme="light"] .spark-tooltip{background:rgba(255,255,255,0.95);}
.spark-tooltip-date{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:0.08em;margin-bottom:3px;}
.spark-tooltip-val{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--blue2);}
.spark-crosshair{position:absolute;top:0;bottom:0;width:1px;background:rgba(96,165,250,0.5);pointer-events:none;display:none;}
.hero-stats{background:var(--panel2);display:flex;flex-direction:column;justify-content:center;}
.hstat{padding:20px 36px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .2s;}
.hstat:last-child{border-bottom:none;}
.hstat:hover{background:var(--panel3);}
.hstat.active{background:var(--panel3);border-left:2px solid var(--blue);}
.hstat-n{font-family:var(--mono);font-size:22px;font-weight:700;line-height:1;color:var(--text);transition:color .2s;}
.hstat:hover .hstat-n,.hstat.active .hstat-n{color:var(--blue2);}
.hstat-l{font-size:10px;letter-spacing:0.14em;color:var(--text3);text-transform:uppercase;margin-top:5px;}

/* COMPARE HERO */
.cmp-hero{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line2);border-radius:14px;overflow:hidden;margin-bottom:12px;}
.cmp-panel{background:var(--panel);padding:28px 32px;}
.cmp-app-lbl{font-family:var(--mono);font-size:10px;letter-spacing:0.15em;color:var(--text3);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.cmp-dot{width:7px;height:7px;border-radius:50%;}
.cmp-amount{font-family:var(--mono);font-size:38px;font-weight:700;line-height:1;letter-spacing:-0.02em;margin-bottom:6px;}
.cmp-sub{font-size:11px;color:var(--text2);margin-bottom:16px;}
.cmp-stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border-top:1px solid var(--line);}
.cmp-stat{background:var(--panel2);padding:12px 14px;}
.cmp-stat-n{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--text);}
.cmp-stat-l{font-size:9px;letter-spacing:0.12em;color:var(--text3);text-transform:uppercase;margin-top:3px;}

/* TARGET */
.target-strip{background:var(--panel);border:1px solid var(--line2);border-radius:12px;padding:22px 28px;margin-bottom:12px;display:flex;align-items:center;gap:28px;flex-wrap:wrap;}
.target-left{flex:1;min-width:200px;}
.target-label{font-family:var(--mono);font-size:10px;letter-spacing:0.14em;color:var(--text3);text-transform:uppercase;margin-bottom:10px;display:flex;justify-content:space-between;}
.target-label span{color:var(--blue2);}
.track{height:4px;background:var(--panel3);border-radius:100px;overflow:hidden;margin-bottom:8px;}
.fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--blue),var(--blue2));box-shadow:0 0 10px rgba(59,130,246,0.5);transition:width 1.4s cubic-bezier(.22,1,.36,1);}
.target-meta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--text2);}
.target-pct{font-family:var(--mono);font-size:32px;font-weight:700;color:var(--blue);min-width:80px;text-align:right;}
.record-num{font-family:var(--mono);font-weight:700;color:var(--amber);}
.edit-btn{background:transparent;border:1px solid var(--line2);border-radius:6px;padding:8px 16px;font-family:var(--mono);font-size:10px;letter-spacing:0.1em;color:var(--text2);cursor:pointer;transition:all .2s;text-transform:uppercase;}
.edit-btn:hover{border-color:var(--blue);color:var(--blue);}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:12px;margin:24px 0 12px;}
.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--line2),transparent);}
.divider span{font-family:var(--mono);font-size:10px;letter-spacing:0.2em;color:var(--text3);text-transform:uppercase;white-space:nowrap;}

/* AD CARDS */
.ad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line2);border-radius:12px;overflow:hidden;margin-bottom:12px;}
.ad-card{background:var(--panel);padding:26px 26px 22px;position:relative;transition:background .2s;}
.ad-card:hover{background:var(--panel2);}
.ad-top-line{position:absolute;top:0;left:0;right:0;height:2px;}
.ad-card.inter .ad-top-line{background:linear-gradient(90deg,var(--blue),transparent);}
.ad-card.banner .ad-top-line{background:linear-gradient(90deg,var(--emerald),transparent);}
.ad-card.reward .ad-top-line{background:linear-gradient(90deg,var(--violet),transparent);}
.ad-tag{display:inline-block;font-family:var(--mono);font-size:9px;letter-spacing:0.18em;padding:3px 8px;border-radius:3px;margin-bottom:8px;text-transform:uppercase;}
.ad-card.inter .ad-tag{background:rgba(59,130,246,0.1);color:var(--blue2);}
.ad-card.banner .ad-tag{background:rgba(16,185,129,0.1);color:var(--emerald);}
.ad-card.reward .ad-tag{background:rgba(139,92,246,0.1);color:var(--violet);}
.ad-name{font-family:var(--mono);font-size:16px;font-weight:700;margin-bottom:18px;}
.ad-card.inter .ad-name{color:var(--blue2);}
.ad-card.banner .ad-name{color:var(--emerald);}
.ad-card.reward .ad-name{color:var(--violet);}
.stat-line{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid var(--line);}
.sl-key{font-size:10px;letter-spacing:0.12em;color:var(--text3);text-transform:uppercase;}
.sl-val{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--text);}
.sl-val.y{color:var(--amber);}.sl-val.b{color:var(--blue2);}.sl-val.r{color:var(--rose);}

/* CHARTS */
.chart-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--line);border:1px solid var(--line2);border-radius:12px;overflow:hidden;margin-bottom:12px;}
.chart-panel{background:var(--panel);padding:24px 26px;transition:background .2s;}
.chart-panel:hover{background:var(--panel2);}
.chart-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:0.15em;color:var(--text3);text-transform:uppercase;margin-bottom:16px;}
.chart-wrap{position:relative;height:180px;}

/* BOTTOM */
.bottom-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line2);border-radius:12px;overflow:hidden;margin-bottom:12px;}
.list-panel{background:var(--panel);padding:22px 24px;}
.list-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:0.15em;color:var(--text3);text-transform:uppercase;margin-bottom:14px;}
.list-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);}
.list-row:last-child{border-bottom:none;}
.list-row:hover .list-rname{color:var(--blue2);}
.list-rk{font-family:var(--mono);font-size:11px;color:var(--text3);width:18px;}
.list-rname{flex:1;font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .15s;}
.mini-track{width:60px;height:2px;background:var(--panel3);border-radius:100px;overflow:hidden;}
.mini-fill{height:100%;border-radius:100px;background:var(--blue);transition:width .6s;}
.list-rval{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text);min-width:32px;text-align:right;}
.tl-panel{background:var(--panel);padding:22px 24px;display:flex;flex-direction:column;}
.tl-scroll{flex:1;overflow-y:auto;max-height:280px;}
.tl-scroll::-webkit-scrollbar{width:2px;}
.tl-scroll::-webkit-scrollbar-thumb{background:var(--line2);border-radius:100px;}
.tl-row{display:flex;align-items:flex-start;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);animation:fadeSlide .3s ease;}
@keyframes fadeSlide{from{opacity:0;transform:translateX(-6px);}to{opacity:1;transform:translateX(0);}}
.tl-row:last-child{border-bottom:none;}
.tl-dot{margin-top:4px;width:5px;height:5px;border-radius:50%;background:var(--blue);box-shadow:0 0 6px rgba(59,130,246,0.6);flex-shrink:0;}
.tl-body{flex:1;}
.tl-ts{font-family:var(--mono);font-size:10px;color:var(--blue2);letter-spacing:0.04em;margin-bottom:2px;}
.tl-msg{font-size:12px;color:var(--text);line-height:1.4;}
.tl-ctx{font-size:10px;color:var(--text3);margin-top:2px;}
.tl-empty{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:0.1em;padding:20px 0;text-align:center;}

/* FOOTER */
.footer{display:flex;align-items:center;justify-content:center;gap:16px;padding-top:28px;border-top:1px solid var(--line);font-family:var(--mono);font-size:10px;letter-spacing:0.12em;color:var(--text3);text-transform:uppercase;}
.footer-sep{width:2px;height:2px;border-radius:50%;background:var(--text3);}
#last-update{color:var(--blue2);}

/* LOADER */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:70vh;gap:18px;}
.loader-ring{width:36px;height:36px;border:1px solid var(--line2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-txt{font-family:var(--mono);font-size:10px;letter-spacing:0.2em;color:var(--text3);text-transform:uppercase;}

/* MODALS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(8px);z-index:500;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.mbox{background:var(--panel2);border:1px solid var(--line2);border-radius:14px;padding:30px;width:380px;max-width:95vw;box-shadow:0 32px 64px rgba(0,0,0,0.5);animation:appear .22s cubic-bezier(.34,1.56,.64,1);}
@keyframes appear{from{opacity:0;transform:scale(.93) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.mbox-title{font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:0.08em;color:var(--blue2);margin-bottom:4px;}
.mbox-sub{font-size:12px;color:var(--text2);margin-bottom:20px;}
.mfield{margin-bottom:14px;}
.mfield label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:0.12em;color:var(--text3);text-transform:uppercase;margin-bottom:6px;}
.mfield input{width:100%;background:var(--panel3);border:1px solid var(--line2);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:14px;font-weight:700;padding:11px 14px;outline:none;transition:border-color .2s,box-shadow .2s;}
.mfield input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,0.15);}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin-top:4px;}
.eopt{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;border-radius:7px;cursor:pointer;transition:background .12s;border:2px solid transparent;}
.eopt:hover{background:var(--panel3);}
.eopt.sel{background:var(--blue-dim);border-color:var(--blue);}
.color-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;margin-top:4px;}
.copt{width:30px;height:30px;border-radius:6px;cursor:pointer;transition:transform .12s;border:2px solid transparent;}
.copt:hover{transform:scale(1.12);}
.copt.sel{border-color:#fff;transform:scale(1.1);}
.mrow{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}
.mbtn{background:transparent;border:1px solid var(--line2);border-radius:7px;padding:9px 18px;font-family:var(--mono);font-size:11px;letter-spacing:0.08em;color:var(--text2);cursor:pointer;transition:all .2s;}
.mbtn:hover{border-color:var(--blue);color:var(--blue);}
.mbtn.ok{background:var(--blue);border-color:var(--blue);color:#fff;}
.mbtn.ok:hover{box-shadow:0 4px 16px var(--blue-glow);}

/* CALENDAR */
.cal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);z-index:600;align-items:center;justify-content:center;}
.cal-overlay.open{display:flex;}
.cal-box{background:var(--panel2);border:1px solid var(--line2);border-radius:16px;padding:28px 32px;width:580px;max-width:95vw;box-shadow:0 32px 64px rgba(0,0,0,0.5);animation:appear .22s cubic-bezier(.34,1.56,.64,1);}
.cal-title{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--blue2);margin-bottom:22px;letter-spacing:0.06em;}
.cal-months{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:22px;}
.cal-mhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-nav{background:transparent;border:1px solid var(--line2);border-radius:5px;width:26px;height:26px;color:var(--text2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.cal-nav:hover{border-color:var(--blue);color:var(--blue);}
.cal-mname{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{text-align:center;font-family:var(--mono);font-size:9px;letter-spacing:0.1em;color:var(--text3);padding:3px 0 8px;text-transform:uppercase;}
.cal-day{text-align:center;font-family:var(--mono);font-size:11px;color:var(--text);padding:6px 2px;border-radius:5px;cursor:pointer;transition:all .12s;user-select:none;position:relative;}
.cal-day:hover:not(.empty):not(.dis){background:var(--blue-dim);color:var(--blue2);}
.cal-day.tod{color:var(--blue2);font-weight:700;}
.cal-day.tod::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(--blue);}
.cal-day.sel{background:var(--blue);color:#fff;font-weight:700;}
.cal-day.inr{background:var(--blue-dim);color:var(--blue2);border-radius:0;}
.cal-day.rs{border-radius:5px 0 0 5px;}.cal-day.re{border-radius:0 5px 5px 0;}.cal-day.rs.re{border-radius:5px;}
.cal-day.empty,.cal-day.dis{cursor:default;}.cal-day.dis{opacity:.3;}
.cal-foot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--line);padding-top:16px;}
.cal-range-txt{font-family:var(--mono);font-size:11px;color:var(--text2);}
.cal-range-txt span{color:var(--blue2);}

@media(max-width:1100px){.bottom-grid{grid-template-columns:1fr 1fr;}.tl-panel{grid-column:span 2;}}
@media(max-width:780px){.ad-grid,.chart-grid,.cmp-hero{grid-template-columns:1fr;}.hero{grid-template-columns:1fr;}.bottom-grid{grid-template-columns:1fr;}.tl-panel{grid-column:span 1;}.cal-months{grid-template-columns:1fr;}}
@media(max-width:520px){.shell{padding:20px 14px 40px;}.hero-main{padding:24px;}.hdr{flex-direction:column;align-items:flex-start;}.hdr-right{width:100%;justify-content:space-between;}}
</style>
</head>
<body>
<div id="root"><div class="loader"><div class="loader-ring"></div><div class="loader-txt">Connecting...</div></div></div>

<!-- ADD/EDIT APP MODAL -->
<div class="overlay" id="appModal">
  <div class="mbox">
    <div class="mbox-title" id="appModalTitle">ADAUGĂ APLICAȚIE</div>
    <div class="mbox-sub" id="appModalSub">Completează detaliile aplicației</div>
    <div class="mfield"><label>Nume aplicație</label><input type="text" id="appName" placeholder="ex: Highway Racer Pro" maxlength="30"></div>
    <div class="mfield"><label>Firebase Realtime DB URL</label><input type="text" id="appDbUrl" placeholder="https://my-app-rtdb.firebaseio.com/"></div>
    <div class="mfield"><label>Iconiță</label><div class="emoji-grid" id="emojiGrid"></div></div>
    <div class="mfield"><label>Culoare accent</label><div class="color-grid" id="colorGrid"></div></div>
    <div class="mrow">
      <button class="mbtn" onclick="closeAppModal()">Anulează</button>
      <button class="mbtn ok" onclick="saveApp()">Salvează</button>
    </div>
  </div>
</div>

<!-- TARGET MODAL -->
<div class="overlay" id="targetModal">
  <div class="mbox">
    <div class="mbox-title">TARGET ZILNIC</div>
    <div class="mbox-sub">Setează venitul target pentru azi</div>
    <div class="mfield"><label>Target ($)</label><input type="number" id="target-input" placeholder="0.00" step="0.01" min="0"></div>
    <div class="mrow">
      <button class="mbtn" onclick="closeTargetModal()">Anulează</button>
      <button class="mbtn ok" onclick="saveTarget()">Salvează</button>
    </div>
  </div>
</div>

<!-- CALENDAR MODAL -->
<div class="cal-overlay" id="calModal">
  <div class="cal-box">
    <div class="cal-title">// SELECTEAZĂ PERIOADA</div>
    <div class="cal-months" id="calMonths"></div>
    <div class="cal-foot">
      <div class="cal-range-txt" id="calRangeTxt">Selectează datele</div>
      <div style="display:flex;gap:8px;">
        <button class="mbtn" onclick="closeCal()">Anulează</button>
        <button class="mbtn ok" id="calApplyBtn" onclick="applyCal()" disabled>Aplică</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ── APP REGISTRY ── */
const DEFAULT_APPS = [{
  id:'bmw_540i', name:'540I Simulator',
  dbUrl:'https://bmwadsstats-default-rtdb.firebaseio.com/',
  icon:'🚗', color:'#3b82f6'
}];

function loadApps(){ try{ return JSON.parse(localStorage.getItem('adApps'))||DEFAULT_APPS; }catch{ return DEFAULT_APPS; } }
function saveApps(l){ localStorage.setItem('adApps',JSON.stringify(l)); }

let apps        = loadApps();
let activeAppId = localStorage.getItem('activeApp')||apps[0]?.id;
let compareMode = false;
let compareAppId= null;

/* ── FIREBASE POOL ── */
const fbApps={}, fbState={}, fbUnsub={};

function connectApp(app){
  if(fbUnsub[app.id]) return;
  let fa = getApps().find(a=>a.options.databaseURL===app.dbUrl);
  if(!fa) fa = initializeApp({databaseURL:app.dbUrl}, app.id+'_'+Date.now());
  fbApps[app.id]=fa;
  const db=getDatabase(fa);
  onValue(ref(db,'/'), snap=>{ fbState[app.id]=snap.val()||{}; renderAll(); });
  onValue(ref(db,'/timeline'), snap=>{
    if(!fbState[app.id]) fbState[app.id]={};
    fbState[app.id].timeline=snap.val()||{};
    renderTimelineDOM();
    const lu=document.getElementById('last-update');
    if(lu) lu.textContent=new Date().toLocaleTimeString();
  });
  fbUnsub[app.id]=true;
}

function connectActive(){
  const a=apps.find(a=>a.id===activeAppId); if(a) connectApp(a);
  if(compareMode&&compareAppId){ const b=apps.find(a=>a.id===compareAppId); if(b) connectApp(b); }
}

/* ── GLOBAL ── */
let charts={}, activeMetric='rev', dailyTarget=parseFloat(localStorage.getItem('dailyTarget')||'10');
let theme=localStorage.getItem('theme')||'dark';
let activePeriod='today', customStart=null, customEnd=null;
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth();
let calS=null, calE=null, calStep=0;

/* ── THEME ── */
function applyTheme(t){ theme=t; localStorage.setItem('theme',t); document.documentElement.setAttribute('data-theme',t); }
window.toggleTheme=t=>{ applyTheme(t); renderAll(); };

/* ── APP MODAL ── */
const EMOJIS=['🚗','🏎','🚕','🚙','🏍','✈️','🚀','🎮','🕹','🎯','⚡','🔥','💎','🌟','🎵','📱','🏆','🎪','🦊','🐉','🌈','💰','🛸','🎲'];
const COLORS=['#3b82f6','#10b981','#f59e0b','#8b5cf6','#f43f5e','#06b6d4','#84cc16','#ec4899','#f97316','#14b8a6','#a855f7','#eab308','#ef4444','#6366f1','#22d3ee','#4ade80'];
let editingAppId=null, pickedEmoji=EMOJIS[0], pickedColor=COLORS[0];

function emojiGrid(){ return EMOJIS.map(e=>`<div class="eopt${e===pickedEmoji?' sel':''}" onclick="pickEmoji('${e}')">${e}</div>`).join(''); }
function colorGrid(){ return COLORS.map(c=>`<div class="copt${c===pickedColor?' sel':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`).join(''); }

window.openAddApp=()=>{
  editingAppId=null; pickedEmoji=EMOJIS[0]; pickedColor=COLORS[0];
  document.getElementById('appModalTitle').textContent='ADAUGĂ APLICAȚIE';
  document.getElementById('appModalSub').textContent='Completează detaliile noii aplicații';
  document.getElementById('appName').value='';
  document.getElementById('appDbUrl').value='';
  document.getElementById('emojiGrid').innerHTML=emojiGrid();
  document.getElementById('colorGrid').innerHTML=colorGrid();
  document.getElementById('appModal').classList.add('open');
};
window.openEditApp=id=>{
  const app=apps.find(a=>a.id===id); if(!app) return;
  editingAppId=id; pickedEmoji=app.icon; pickedColor=app.color;
  document.getElementById('appModalTitle').textContent='EDITEAZĂ APLICAȚIA';
  document.getElementById('appModalSub').textContent=app.name;
  document.getElementById('appName').value=app.name;
  document.getElementById('appDbUrl').value=app.dbUrl;
  document.getElementById('emojiGrid').innerHTML=emojiGrid();
  document.getElementById('colorGrid').innerHTML=colorGrid();
  document.getElementById('appModal').classList.add('open');
};
window.closeAppModal=()=>document.getElementById('appModal').classList.remove('open');
window.pickEmoji=e=>{ pickedEmoji=e; document.getElementById('emojiGrid').innerHTML=emojiGrid(); };
window.pickColor=c=>{ pickedColor=c; document.getElementById('colorGrid').innerHTML=colorGrid(); };
window.saveApp=()=>{
  const name=document.getElementById('appName').value.trim();
  const dbUrl=document.getElementById('appDbUrl').value.trim().replace(/\/?$/,'/');
  if(!name){ alert('Introdu un nume!'); return; }
  if(!dbUrl.startsWith('https://')){ alert('URL invalid! Trebuie să înceapă cu https://'); return; }
  if(editingAppId){
    const idx=apps.findIndex(a=>a.id===editingAppId);
    if(idx>=0){ apps[idx]={...apps[idx],name,dbUrl,icon:pickedEmoji,color:pickedColor}; }
  } else {
    const id='app_'+Date.now();
    apps.push({id,name,dbUrl,icon:pickedEmoji,color:pickedColor});
    activeAppId=id; localStorage.setItem('activeApp',activeAppId);
  }
  saveApps(apps); closeAppModal(); connectActive(); renderAll();
};
window.deleteApp=id=>{
  if(apps.length<=1){ alert('Nu poți șterge ultima aplicație!'); return; }
  if(!confirm('Sigur vrei să ștergi această aplicație?')) return;
  apps=apps.filter(a=>a.id!==id);
  if(activeAppId===id){ activeAppId=apps[0].id; localStorage.setItem('activeApp',activeAppId); }
  saveApps(apps); renderAll();
};
window.setActiveApp=id=>{
  if(compareMode&&id!==activeAppId){ compareAppId=id; connectActive(); renderAll(); return; }
  activeAppId=id; localStorage.setItem('activeApp',activeAppId); connectActive(); renderAll();
};

/* ── COMPARE ── */
window.toggleCompare=()=>{
  compareMode=!compareMode;
  if(compareMode){ compareAppId=apps.find(a=>a.id!==activeAppId)?.id||null; connectActive(); }
  renderAll();
};
window.exitCompare=()=>{ compareMode=false; compareAppId=null; renderAll(); };

/* ── TARGET ── */
window.openTargetModal=()=>{ document.getElementById('target-input').value=dailyTarget; document.getElementById('targetModal').classList.add('open'); };
window.closeTargetModal=()=>document.getElementById('targetModal').classList.remove('open');
window.saveTarget=()=>{ const v=parseFloat(document.getElementById('target-input').value); if(!isNaN(v)&&v>0){dailyTarget=v;localStorage.setItem('dailyTarget',v);} closeTargetModal(); renderAll(); };

/* ── UTILS ── */
const ds=d=>d.toISOString().split('T')[0];
const today=()=>ds(new Date());
const fmt=n=>{n=parseFloat(n)||0;return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1000?(n/1000).toFixed(1)+'K':Math.round(n)+'';}
const fmtR=n=>'$'+(parseFloat(n)||0).toFixed(4);
const fmtS=n=>'$'+(parseFloat(n)||0).toFixed(2);
const fmtE=n=>'$'+(parseFloat(n)||0).toFixed(2);
const fmtC=n=>(parseFloat(n)||0).toFixed(2)+'%';

/* ── PERIOD ── */
function periodDays(){
  if(activePeriod==='today') return[today()];
  if(activePeriod==='yesterday'){const y=new Date();y.setDate(y.getDate()-1);return[ds(y)];}
  if(activePeriod==='7d'){const a=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);a.push(ds(d));}return a;}
  if(activePeriod==='30d'){const a=[];for(let i=29;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);a.push(ds(d));}return a;}
  if(activePeriod==='custom'&&customStart&&customEnd){const a=[];let c=new Date(customStart);const e=new Date(customEnd);while(c<=e){a.push(ds(c));c.setDate(c.getDate()+1);}return a;}
  return[today()];
}
function periodLabel(){
  if(activePeriod==='today') return'AZI';
  if(activePeriod==='yesterday'){const y=new Date();y.setDate(y.getDate()-1);return'IERI · '+ds(y);}
  if(activePeriod==='7d') return'ULTIMELE 7 ZILE';
  if(activePeriod==='30d') return'ULTIMELE 30 ZILE';
  if(activePeriod==='custom'&&customStart&&customEnd) return customStart+' → '+customEnd;
  return'';
}
window.setPeriod=p=>{ if(p==='custom'){openCal();return;} activePeriod=p; renderAll(); };

/* ── AGGREGATION ── */
function periodStats(state){
  const daily=state.daily||{},days=periodDays();
  let rev=0,intI=0,banI=0,rewI=0,intC=0,banC=0,rewC=0,intR=0,banR=0,rewR=0,sess=0,intEc=0,rewEc=0,iES=0,rES=0;
  days.forEach(d=>{
    const dd=daily[d]||{};rev+=parseFloat(dd.revenue)||0;sess+=parseInt(dd.sessions)||0;
    const intr=dd.interstitial||{},ban=dd.banner||{},rew=dd.rewarded||{};
    intI+=parseInt(intr.impressions)||0;banI+=parseInt(ban.impressions)||0;rewI+=parseInt(rew.impressions)||0;
    intC+=parseInt(intr.clicks)||0;banC+=parseInt(ban.clicks)||0;rewC+=parseInt(rew.clicks)||0;
    intR+=parseFloat(intr.revenue)||0;banR+=parseFloat(ban.revenue)||0;rewR+=parseFloat(rew.revenue)||0;
    if(parseFloat(intr.ecpm)){iES+=parseFloat(intr.ecpm);intEc++;}
    if(parseFloat(rew.ecpm)){rES+=parseFloat(rew.ecpm);rewEc++;}
  });
  return{rev,imp:intI+banI+rewI,clk:intC+banC+rewC,sess,
    interstitial:{impressions:intI,clicks:intC,revenue:intR,ctr:intI>0?intC/intI*100:0,ecpm:intEc?iES/intEc:0},
    banner:{impressions:banI,clicks:banC,revenue:banR,ctr:banI>0?banC/banI*100:0,ecpm:0},
    rewarded:{impressions:rewI,clicks:rewC,revenue:rewR,ctr:rewI>0?rewC/rewI*100:0,ecpm:rewEc?rES/rewEc:0}};
}
function totalRev(state){return parseFloat((state.total||{}).revenue)||0;}
function bestDay(state){return Object.values(state.daily||{}).reduce((b,d)=>{const r=parseFloat((d||{}).revenue)||0;return r>b?r:b;},0);}
function chartData(state){
  const daily=state.daily||{},days=periodDays();
  const show=days.length===1?(()=>{const a=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);a.push(ds(d));}return a;})():days;
  return{
    labels:show.map(d=>d.slice(5)),
    revenue:show.map(d=>parseFloat((daily[d]||{}).revenue)||0),
    sessions:show.map(d=>parseInt((daily[d]||{}).sessions)||0),
    impressions:show.map(d=>{const dd=daily[d]||{};return(parseInt((dd.interstitial||{}).impressions)||0)+(parseInt((dd.banner||{}).impressions)||0)+(parseInt((dd.rewarded||{}).impressions)||0);})
  };
}
function spark30(state){
  const daily=state.daily||{},days=[];
  for(let i=29;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(ds(d));}
  return{days,
    rev:days.map(d=>parseFloat((daily[d]||{}).revenue)||0),
    imp:days.map(d=>{const dd=daily[d]||{};return(parseInt((dd.interstitial||{}).impressions)||0)+(parseInt((dd.banner||{}).impressions)||0)+(parseInt((dd.rewarded||{}).impressions)||0);}),
    clk:days.map(d=>{const dd=daily[d]||{};return(parseInt((dd.interstitial||{}).clicks)||0)+(parseInt((dd.banner||{}).clicks)||0)+(parseInt((dd.rewarded||{}).clicks)||0);}),
    sess:days.map(d=>parseInt((daily[d]||{}).sessions)||0)};
}
function topList(state,node,max=7){return Object.entries(state[node]||{}).map(([k,v])=>({name:k.replace(/_/g,' '),val:parseInt(v)||0})).sort((a,b)=>b.val-a.val).slice(0,max);}
function getTimeline(state){return Object.values(state.timeline||{}).filter(e=>e&&(e.time||e.text)).sort((a,b)=>String(b.time||'').localeCompare(String(a.time||''))).slice(0,20);}

/* ── ACTIVE METRIC ── */
window.setActiveMetric=metric=>{
  activeMetric=metric;
  const sp=spark30(fbState[activeAppId]||{});
  if(charts.cSpark){charts.cSpark.data.datasets[0].data=sp[metric]||sp.rev;charts.cSpark.update('active');}
  document.querySelectorAll('.hstat').forEach(el=>el.classList.toggle('active',el.dataset.metric===metric));
};

/* ── TIMELINE DOM ── */
function renderTimelineDOM(){
  const c=document.querySelector('.tl-scroll'); if(!c) return;
  const tl=getTimeline(fbState[activeAppId]||{});
  c.innerHTML=tl.length?tl.map(e=>`<div class="tl-row"><div class="tl-dot"></div><div class="tl-body"><div class="tl-ts">${e.time||''}</div><div class="tl-msg">${e.text||''}</div><div class="tl-ctx">${e.country||''}${e.device?' · '+String(e.device).substring(0,18):''}</div></div></div>`).join(''):'<div class="tl-empty">// NICIO ACTIVITATE</div>';
}

/* ── RENDER ── */
function renderAll(){
  const activeApp=apps.find(a=>a.id===activeAppId)||apps[0];
  if(!activeApp) return;
  const state=fbState[activeAppId]||{};
  const ps=periodStats(state),pct=Math.min((ps.rev/dailyTarget)*100,100);
  const cd=chartData(state),sp=spark30(state);
  const cnt=topList(state,'countries'),dev=topList(state,'devices'),tl=getTimeline(state);
  const capp=compareMode?apps.find(a=>a.id===compareAppId):null;
  const cstate=capp?(fbState[compareAppId]||{}):null;
  const cps=cstate?periodStats(cstate):null;

  const chips=apps.map(a=>`
    <div class="app-chip${a.id===activeAppId?' active':''}" onclick="setActiveApp('${a.id}')" ondblclick="openEditApp('${a.id}')">
      <div class="app-chip-dot" style="background:${a.color}"></div>
      <span>${a.icon}</span><span>${a.name}</span>
      ${apps.length>1?`<button class="app-del" onclick="event.stopPropagation();deleteApp('${a.id}')">✕</button>`:''}
    </div>`).join('');

  const adTypes=[{key:'interstitial',label:'Interstitial',cls:'inter'},{key:'banner',label:'Banner',cls:'banner'},{key:'rewarded',label:'Rewarded',cls:'reward'}];

  document.getElementById('root').innerHTML=`
  <div class="shell">
    <div class="hdr">
      <div class="brand">
        <div class="brand-mark" style="background:${activeApp.color}22;border:1px solid ${activeApp.color}55;box-shadow:0 0 20px ${activeApp.color}33;">${activeApp.icon}</div>
        <div><div class="brand-name">${activeApp.name.toUpperCase().replace(/ /g,'_')}</div><div class="brand-sub">Ads Dashboard · Realtime</div></div>
      </div>
      <div class="hdr-right">
        <div class="status-chip"><div class="pulse"></div>LIVE</div>
        <button class="icon-btn${compareMode?' on':''}" onclick="toggleCompare()">⚖ COMPARĂ</button>
        <div class="theme-sw">
          <button class="tsw${theme==='dark'?' on':''}" onclick="toggleTheme('dark')">🌙</button>
          <button class="tsw${theme==='light'?' on':''}" onclick="toggleTheme('light')">☀️</button>
        </div>
      </div>
    </div>

    <div class="app-bar">
      <span class="app-bar-lbl">APPS</span>
      ${chips}
      <button class="add-btn" onclick="openAddApp()">＋ ADAUGĂ APP</button>
    </div>

    ${compareMode&&capp?`
    <div class="cmp-banner">
      <span class="cmp-banner-txt">Comparând: <b>${activeApp.icon} ${activeApp.name}</b> vs <b style="color:${capp.color}">${capp.icon} ${capp.name}</b> — click pe alt app pentru a schimba</span>
      <button class="cmp-exit" onclick="exitCompare()">✕ IEȘI</button>
    </div>`:''}

    <div class="period-row">
      <button class="ptab${activePeriod==='today'?' on':''}" onclick="setPeriod('today')">AZI</button>
      <button class="ptab${activePeriod==='yesterday'?' on':''}" onclick="setPeriod('yesterday')">IERI</button>
      <button class="ptab${activePeriod==='7d'?' on':''}" onclick="setPeriod('7d')">7 ZILE</button>
      <button class="ptab${activePeriod==='30d'?' on':''}" onclick="setPeriod('30d')">30 ZILE</button>
      <button class="ptab${activePeriod==='custom'?' on':''}" onclick="setPeriod('custom')">📅 CUSTOM</button>
      <span class="period-info">${periodLabel()}</span>
    </div>

    ${compareMode&&capp&&cps?`
    <div class="cmp-hero">
      <div class="cmp-panel">
        <div class="cmp-app-lbl"><div class="cmp-dot" style="background:${activeApp.color}"></div>${activeApp.icon} ${activeApp.name}</div>
        <div class="cmp-amount" style="color:${activeApp.color}">${fmtS(ps.rev)}</div>
        <div class="cmp-sub">↑ All-time: ${fmtS(totalRev(state))}</div>
        <div class="cmp-stats-row">
          <div class="cmp-stat"><div class="cmp-stat-n">${fmt(ps.imp)}</div><div class="cmp-stat-l">Impresii</div></div>
          <div class="cmp-stat"><div class="cmp-stat-n">${fmt(ps.clk)}</div><div class="cmp-stat-l">Clickuri</div></div>
          <div class="cmp-stat"><div class="cmp-stat-n">${fmt(ps.sess)}</div><div class="cmp-stat-l">Sesiuni</div></div>
        </div>
      </div>
      <div class="cmp-panel">
        <div class="cmp-app-lbl"><div class="cmp-dot" style="background:${capp.color}"></div>${capp.icon} ${capp.name}</div>
        <div class="cmp-amount" style="color:${capp.color}">${fmtS(cps.rev)}</div>
        <div class="cmp-sub">↑ All-time: ${fmtS(totalRev(cstate))}</div>
        <div class="cmp-stats-row">
          <div class="cmp-stat"><div class="cmp-stat-n">${fmt(cps.imp)}</div><div class="cmp-stat-l">Impresii</div></div>
          <div class="cmp-stat"><div class="cmp-stat-n">${fmt(cps.clk)}</div><div class="cmp-stat-l">Clickuri</div></div>
          <div class="cmp-stat"><div class="cmp-stat-n">${fmt(cps.sess)}</div><div class="cmp-stat-l">Sesiuni</div></div>
        </div>
      </div>
    </div>
    <div class="divider"><span>grafice comparative · ${periodLabel()}</span></div>
    <div class="chart-grid">
      <div class="chart-panel"><div class="chart-eyebrow">// VENIT — ${activeApp.name}</div><div class="chart-wrap"><canvas id="cRevA"></canvas></div></div>
      <div class="chart-panel"><div class="chart-eyebrow">// VENIT — ${capp.name}</div><div class="chart-wrap"><canvas id="cRevB"></canvas></div></div>
      <div class="chart-panel"><div class="chart-eyebrow">// IMPRESII — ${activeApp.name}</div><div class="chart-wrap"><canvas id="cImpA"></canvas></div></div>
      <div class="chart-panel"><div class="chart-eyebrow">// IMPRESII — ${capp.name}</div><div class="chart-wrap"><canvas id="cImpB"></canvas></div></div>
    </div>`:`
    <div class="hero">
      <div class="hero-main">
        <div class="hero-eyebrow">// VENIT · ${periodLabel()}</div>
        <div class="hero-amount">${fmtS(ps.rev)}</div>
        <div class="hero-sub">▲ ALL TIME ${fmtS(totalRev(state))}</div>
        <canvas id="heroSparkline" class="hero-sparkline"></canvas>
        <div class="spark-crosshair" id="sparkCrosshair"></div>
        <div class="spark-tooltip" id="sparkTooltip" style="display:none;top:12px;left:50%"></div>
      </div>
      <div class="hero-stats">
        <div class="hstat${activeMetric==='imp'?' active':''}" data-metric="imp" onclick="setActiveMetric('imp')"><div class="hstat-n">${fmt(ps.imp)}</div><div class="hstat-l">Impresii</div></div>
        <div class="hstat${activeMetric==='clk'?' active':''}" data-metric="clk" onclick="setActiveMetric('clk')"><div class="hstat-n">${fmt(ps.clk)}</div><div class="hstat-l">Clickuri</div></div>
        <div class="hstat${activeMetric==='sess'?' active':''}" data-metric="sess" onclick="setActiveMetric('sess')"><div class="hstat-n">${fmt(ps.sess)}</div><div class="hstat-l">Sesiuni</div></div>
        <div class="hstat${activeMetric==='rev'?' active':''}" data-metric="rev" onclick="setActiveMetric('rev')"><div class="hstat-n">${fmtS(totalRev(state))}</div><div class="hstat-l">All-Time $</div></div>
      </div>
    </div>
    <div class="target-strip">
      <div class="target-left">
        <div class="target-label">TARGET ZILNIC<span>${fmtS(ps.rev)} / ${fmtS(dailyTarget)}</span></div>
        <div class="track"><div class="fill" style="width:${pct.toFixed(1)}%"></div></div>
        <div class="target-meta"><span>${pct.toFixed(1)}% atins</span><span>🏆 Record: <span class="record-num">${fmtS(bestDay(state))}</span></span></div>
      </div>
      <div class="target-pct">${pct.toFixed(0)}%</div>
      <button class="edit-btn" onclick="openTargetModal()">EDIT</button>
    </div>
    <div class="divider"><span>per tip de reclamă · ${periodLabel()}</span></div>
    <div class="ad-grid">
      ${adTypes.map(a=>{const pd=ps[a.key]||{};return`<div class="ad-card ${a.cls}"><div class="ad-top-line"></div><div class="ad-tag">${a.key}</div><div class="ad-name">${a.label}</div><div class="stat-line"><span class="sl-key">Impresii</span><span class="sl-val">${fmt(pd.impressions||0)}</span></div><div class="stat-line"><span class="sl-key">Clickuri</span><span class="sl-val">${fmt(pd.clicks||0)}</span></div><div class="stat-line"><span class="sl-key">CTR</span><span class="sl-val r">${fmtC(pd.ctr||0)}</span></div><div class="stat-line"><span class="sl-key">Venit</span><span class="sl-val y">${fmtR(pd.revenue||0)}</span></div><div class="stat-line"><span class="sl-key">eCPM mediu</span><span class="sl-val b">${fmtE(pd.ecpm||0)}</span></div></div>`;}).join('')}
    </div>
    <div class="divider"><span>grafice · ultimele 7 zile</span></div>
    <div class="chart-grid">
      <div class="chart-panel"><div class="chart-eyebrow">// VENIT ($)</div><div class="chart-wrap"><canvas id="cRev"></canvas></div></div>
      <div class="chart-panel"><div class="chart-eyebrow">// IMPRESII</div><div class="chart-wrap"><canvas id="cImp"></canvas></div></div>
      <div class="chart-panel"><div class="chart-eyebrow">// SESIUNI</div><div class="chart-wrap"><canvas id="cSess"></canvas></div></div>
      <div class="chart-panel"><div class="chart-eyebrow">// DISTRIBUȚIE IMPRESII</div><div class="chart-wrap"><canvas id="cPie"></canvas></div></div>
    </div>`}

    <div class="divider"><span>țări · dispozitive · activitate live</span></div>
    <div class="bottom-grid">
      <div class="list-panel">
        <div class="list-eyebrow">// TOP ȚĂRI</div>
        ${cnt.length?cnt.map((c,i)=>`<div class="list-row"><div class="list-rk">${i+1}</div><div class="list-rname">${c.name}</div><div class="mini-track"><div class="mini-fill" style="width:${cnt[0].val>0?(c.val/cnt[0].val*100).toFixed(0):0}%"></div></div><div class="list-rval">${fmt(c.val)}</div></div>`).join(''):'<div style="color:var(--text3);font-size:12px;padding:12px 0;font-family:var(--mono)">// FĂRĂ DATE</div>'}
      </div>
      <div class="list-panel">
        <div class="list-eyebrow">// TOP DISPOZITIVE</div>
        ${dev.length?dev.map((d,i)=>`<div class="list-row"><div class="list-rk">${i+1}</div><div class="list-rname">${d.name}</div><div class="mini-track"><div class="mini-fill" style="width:${dev[0].val>0?(d.val/dev[0].val*100).toFixed(0):0}%;background:var(--violet)"></div></div><div class="list-rval">${fmt(d.val)}</div></div>`).join(''):'<div style="color:var(--text3);font-size:12px;padding:12px 0;font-family:var(--mono)">// FĂRĂ DATE</div>'}
      </div>
      <div class="tl-panel">
        <div class="list-eyebrow">// ACTIVITATE LIVE</div>
        <div class="tl-scroll">
          ${tl.length?tl.map(e=>`<div class="tl-row"><div class="tl-dot"></div><div class="tl-body"><div class="tl-ts">${e.time||''}</div><div class="tl-msg">${e.text||''}</div><div class="tl-ctx">${e.country||''}${e.device?' · '+String(e.device).substring(0,18):''}</div></div></div>`).join(''):'<div class="tl-empty">// NICIO ACTIVITATE</div>'}
        </div>
      </div>
    </div>

    <div class="footer">
      <span>UPDATED</span><div class="footer-sep"></div>
      <span id="last-update">${new Date().toLocaleTimeString()}</span>
      <div class="footer-sep"></div><span>AUTO-REFRESH LIVE</span>
    </div>
  </div>`;

  buildCharts(cd,sp,activeApp,capp,cstate);
}

/* ── CHARTS ── */
function buildCharts(data,sp,activeApp,capp,cstate){
  const dark=theme==='dark';
  const gc=dark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.05)';
  const tc=dark?'#334155':'#94a3b8';
  const base={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:gc},ticks:{color:tc,font:{family:'Space Mono',size:10}}},y:{grid:{color:gc},ticks:{color:tc,font:{family:'Space Mono',size:10}}}}};

  Object.keys(charts).forEach(id=>{if(charts[id]){charts[id].destroy();delete charts[id];}});

  if(compareMode&&capp&&cstate){
    const cdB=chartData(cstate);
    const L=(id,lbl,color,dat)=>{const el=document.getElementById(id);if(!el)return;charts[id]=new Chart(el,{type:'line',data:{labels:lbl,datasets:[{data:dat,borderColor:color,backgroundColor:color+'18',borderWidth:1.5,fill:true,tension:.4,pointRadius:3,pointBackgroundColor:color}]},options:base});};
    L('cRevA',data.labels,activeApp.color,data.revenue);
    L('cRevB',cdB.labels,capp.color,cdB.revenue);
    L('cImpA',data.labels,activeApp.color,data.impressions);
    L('cImpB',cdB.labels,capp.color,cdB.impressions);
    return;
  }

  // Sparkline
  const sel=document.getElementById('heroSparkline');
  if(sel){
    charts.cSpark=new Chart(sel,{type:'line',data:{labels:sp.days,datasets:[{data:sp[activeMetric]||sp.rev,borderColor:'rgba(96,165,250,0.55)',backgroundColor:(ctx)=>{const g=ctx.chart.canvas.getContext('2d').createLinearGradient(0,0,0,ctx.chart.canvas.height);g.addColorStop(0,'rgba(59,130,246,0.4)');g.addColorStop(1,'rgba(59,130,246,0)');return g;},borderWidth:1.5,fill:true,tension:.4,pointRadius:0,pointHoverRadius:5,pointHoverBackgroundColor:'#60a5fa',pointHoverBorderColor:'#fff',pointHoverBorderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
        plugins:{legend:{display:false},tooltip:{enabled:false,external(ctx){
          const tt=document.getElementById('sparkTooltip'),ch=document.getElementById('sparkCrosshair');
          if(!tt||!ch)return;
          if(ctx.tooltip.opacity===0){tt.style.display='none';ch.style.display='none';return;}
          const dp=ctx.tooltip.dataPoints[0];
          const mFmt={rev:v=>'$'+parseFloat(v).toFixed(4),imp:v=>fmt(v),clk:v=>fmt(v),sess:v=>fmt(v)};
          const mLbl={rev:'Venit',imp:'Impresii',clk:'Clickuri',sess:'Sesiuni'};
          tt.style.display='block';tt.style.left=ctx.tooltip.caretX+'px';tt.style.top='10px';
          tt.innerHTML=`<div class="spark-tooltip-date">${dp.label} · ${mLbl[activeMetric]||''}</div><div class="spark-tooltip-val">${(mFmt[activeMetric]||fmt)(dp.raw)}</div>`;
          ch.style.display='block';ch.style.left=ctx.tooltip.caretX+'px';
        }}},
        scales:{x:{display:false},y:{display:false}},animation:{duration:600},layout:{padding:0}}});
  }

  const tot=(fbState[activeAppId]||{}).total||{};
  const r=document.getElementById('cRev');if(r)charts.cRev=new Chart(r,{type:'bar',data:{labels:data.labels,datasets:[{data:data.revenue,backgroundColor:'rgba(245,158,11,0.4)',borderColor:'#f59e0b',borderWidth:0,borderRadius:4,borderSkipped:false}]},options:base});
  const i=document.getElementById('cImp');if(i)charts.cImp=new Chart(i,{type:'line',data:{labels:data.labels,datasets:[{data:data.impressions,borderColor:'#60a5fa',backgroundColor:'rgba(96,165,250,0.07)',borderWidth:1.5,fill:true,tension:.4,pointRadius:3,pointBackgroundColor:'#60a5fa'}]},options:base});
  const s=document.getElementById('cSess');if(s)charts.cSess=new Chart(s,{type:'line',data:{labels:data.labels,datasets:[{data:data.sessions,borderColor:'#10b981',backgroundColor:'rgba(16,185,129,0.07)',borderWidth:1.5,fill:true,tension:.4,pointRadius:3,pointBackgroundColor:'#10b981'}]},options:base});
  const p=document.getElementById('cPie');if(p)charts.cPie=new Chart(p,{type:'doughnut',data:{labels:['Interstitial','Banner','Rewarded'],datasets:[{data:[parseInt((tot.interstitial||{}).impressions)||0,parseInt((tot.banner||{}).impressions)||0,parseInt((tot.rewarded||{}).impressions)||0],backgroundColor:['rgba(59,130,246,0.65)','rgba(16,185,129,0.65)','rgba(139,92,246,0.65)'],borderColor:['#3b82f6','#10b981','#8b5cf6'],borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'bottom',labels:{color:tc,font:{family:'Space Mono',size:10},padding:14,boxWidth:10}}}}});
}

/* ── CALENDAR ── */
window.openCal=()=>{calS=null;calE=null;calStep=0;calYear=new Date().getFullYear();calMonth=new Date().getMonth();renderCal();document.getElementById('calModal').classList.add('open');};
window.closeCal=()=>document.getElementById('calModal').classList.remove('open');
window.applyCal=()=>{if(calS&&calE){customStart=calS<calE?calS:calE;customEnd=calS<calE?calE:calS;activePeriod='custom';closeCal();renderAll();}};
window.calNav=delta=>{calMonth+=delta;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}renderCal();};
window.calPick=d=>{if(calStep===0){calS=d;calE=null;calStep=1;}else{calE=d;calStep=0;document.getElementById('calApplyBtn').disabled=false;}updateCalRange();renderCalGrids();};
function updateCalRange(){const el=document.getElementById('calRangeTxt');if(!el)return;if(!calS){el.textContent='Selectează data start';return;}if(!calE){el.innerHTML=`<span>${calS}</span> → ?`;return;}const s=calS<calE?calS:calE,e=calS<calE?calE:calS;el.innerHTML=`<span>${s}</span> → <span>${e}</span>`;}
function renderCal(){renderCalGrids();updateCalRange();}
function renderCalGrids(){
  const c=document.getElementById('calMonths');if(!c)return;
  const todayS=today(),MN=['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie','Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'],DW=['Lu','Ma','Mi','Jo','Vi','Sâ','Du'];
  const months=[{y:calYear,m:calMonth},{y:calMonth===11?calYear+1:calYear,m:calMonth===11?0:calMonth+1}];
  c.innerHTML=months.map((mo,mi)=>{
    const firstDay=new Date(mo.y,mo.m,1).getDay(),offset=(firstDay+6)%7,daysInM=new Date(mo.y,mo.m+1,0).getDate(),cells=[];
    for(let i=0;i<offset;i++)cells.push('<div class="cal-day empty"></div>');
    for(let d=1;d<=daysInM;d++){
      const ds2=`${mo.y}-${String(mo.m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,isFut=ds2>todayS;
      let cls='cal-day';if(ds2===todayS)cls+=' tod';if(isFut)cls+=' dis';
      if(calS&&calE){const s=calS<calE?calS:calE,e=calS<calE?calE:calS;if(ds2===s)cls+=' sel rs';else if(ds2===e)cls+=' sel re';else if(ds2>s&&ds2<e)cls+=' inr';}
      else if(calS&&ds2===calS)cls+=' sel rs re';
      cells.push(`<div class="${cls}"${isFut?'':` onclick="calPick('${ds2}')"`}>${d}</div>`);
    }
    const nl=mi===0?`<button class="cal-nav" onclick="calNav(-1)">‹</button>`:`<div style="width:26px"></div>`;
    const nr=mi===1?`<button class="cal-nav" onclick="calNav(1)">›</button>`:`<div style="width:26px"></div>`;
    return`<div><div class="cal-mhd">${nl}<div class="cal-mname">${MN[mo.m]} ${mo.y}</div>${nr}</div><div class="cal-grid">${DW.map(d=>`<div class="cal-dow">${d}</div>`).join('')}${cells.join('')}</div></div>`;
  }).join('');
}

/* ── INIT ── */
applyTheme(theme);
connectActive();
</script>
